<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const SB_URL = "https://mnwkluvexuxzdxuhpzwc.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ud2tsdXZleHV4emR4dWhwendjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjgzNDAsImV4cCI6MjA5MDkwNDM0MH0.9I7G0TVQd9T88MSuKU28TdJRY78oJ0u0I0rTzRhkLwU";

// Storage
const store = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  del(k) { try { localStorage.removeItem(k); } catch(e) {} },
};

// API
const hdrs = function(tk) {
  return { apikey: SB_KEY, Authorization: "Bearer " + (tk || SB_KEY), "Content-Type": "application/json", Prefer: "return=representation" };
};

const api = {
  signup: async function(e, p) {
    const r = await fetch(SB_URL + "/auth/v1/signup", { method: "POST", headers: { apikey: SB_KEY, "Content-Type": "application/json" }, body: JSON.stringify({ email: e, password: p }) });
    const d = await r.json();
    if (d.error || d.msg) throw new Error((d.error && d.error.message) || d.msg);
    return d;
  },
  login: async function(e, p) {
    const r = await fetch(SB_URL + "/auth/v1/token?grant_type=password", { method: "POST", headers: { apikey: SB_KEY, "Content-Type": "application/json" }, body: JSON.stringify({ email: e, password: p }) });
    const d = await r.json();
    if (d.error) throw new Error(d.error_description || d.error);
    return d;
  },
  get: async function(tbl, q, tk) {
    const r = await fetch(SB_URL + "/rest/v1/" + tbl + "?" + (q || ""), { headers: hdrs(tk) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Failed"); }
    return r.json();
  },
  post: async function(tbl, d, tk) {
    const r = await fetch(SB_URL + "/rest/v1/" + tbl, { method: "POST", headers: hdrs(tk), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Failed"); }
    return r.json();
  },
  patch: async function(tbl, q, d, tk) {
    const r = await fetch(SB_URL + "/rest/v1/" + tbl + "?" + q, { method: "PATCH", headers: hdrs(tk), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Failed"); }
    return r.json();
  },
  del: async function(tbl, q, tk) {
    const r = await fetch(SB_URL + "/rest/v1/" + tbl + "?" + q, { method: "DELETE", headers: hdrs(tk) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Failed"); }
  },
};

const COLORS = ["#ff6b8a","#ffa26b","#ffd66b","#6bffa2","#6bcfff","#b46bff","#ff6bdb","#6bffef","#ff8f6b","#a5ff6b"];
const EMOJIS = ["🌀","🌙","⭐","🔥","💜","🌊","🌸","⚡","🦋","🍄","🎭","💫","🌿","❄️","🎪","☁️","🪐","🫧"];

function genCode() {
  var c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var r = "";
  for (var i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

const T = { bg:"#0a0b10", s1:"#111219", s2:"#171924", s3:"#1d1f30", bd:"#252842", bd2:"#353860", tx:"#e4e6f0", t2:"#8890a8", t3:"#4d5268", ac:"#b4a5ff", ok:"#6bffa2", wn:"#ffd66b", er:"#ff6b8a", r:"14px", rs:"10px" };

const BP = Object.assign({}, BT, { background:T.ac, color:"#0a0b10" });
const BGh = Object.assign({}, BT, { background:"transparent", color:T.t2, border:"1px solid "+T.bd });

// Icons as simple SVG components
function Icon({d, size, color}) {
  return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
}
function IArrowLeft({size,color}) { return <Icon d="M19 12H5M12 19l-7-7 7-7" size={size} color={color}/>; }
function ISend({size,color}) { return <Icon d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" size={size} color={color}/>; }
function IPlus({size,color}) { return <Icon d="M12 5v14M5 12h14" size={size} color={color}/>; }
function ISearch({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>; }
function ICheck({size,color}) { return <Icon d="M20 6L9 17l-5-5" size={size} color={color}/>; }

function IChevRight({size,color}) { return <Icon d="M9 18l6-6-6-6" size={size} color={color}/>; }
function ICopy({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>; }
function IUserPlus({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>; }
function IMsg({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>; }
function IUsers({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>; }
function IHash({size,color}) { return <Icon d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18" size={size} color={color}/>; }
function IUser({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>; }
function IEdit({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>; }
function ITrash({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>; }
function ILogOut({size,color}) { return <svg width={size||16} height={size||16} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>; }

function Spin({sz}) { return <svg width={sz||18} height={sz||18} viewBox="0 0 24 24" fill="none" stroke={T.ac} strokeWidth="2" style={{animation:"spin 1s linear infinite"}}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>; }

function Badge({alter, sz, on, onClick, style: st}) {
  var size = sz || 34;
  return (
    <div onClick={onClick} style={Object.assign({
      width:size, height:size, borderRadius:"50%", background:alter.color+"20",
      border:"2px solid "+(on?alter.color:"transparent"),
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:size*0.44, cursor:onClick?"pointer":"default",
      transition:"all .2s", flexShrink:0,
      boxShadow:on?"0 0 10px "+alter.color+"33":"none"
    }, st||{})}>
      {alter.avatar_emoji}
    </div>
  );
}

function Dot({n}) {
  if (!n) return null;
  return (
    <div style={{minWidth:18,height:18,borderRadius:9,background:T.ac,color:"#0a0b10",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px"}}>
      {n > 99 ? "99+" : n}
    </div>
  );
}

function Toast({msg, type, onClose}) {
  useEffect(function() { var x = setTimeout(onClose, 3000); return function(){clearTimeout(x);}; }, []);
  var bg = type==="error"?T.er:type==="success"?T.ok:T.ac;
  return (
    <div className="pop" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",padding:"9px 18px",borderRadius:T.rs,background:bg,color:"#0a0b10",fontWeight:600,fontSize:13,zIndex:9999,boxShadow:"0 4px 20px "+bg+"44"}}>
      {msg}
    </div>
  );
}

// ===== AUTH =====
function Auth({onAuth}) {
  var _m = useState("login"), m = _m[0], setM = _m[1];
  var _e = useState(""), email = _e[0], setEmail = _e[1];
  var _p = useState(""), pw = _p[0], setPw = _p[1];
  var _l = useState(false), ld = _l[0], setLd = _l[1];
  var _er = useState(""), err = _er[0], setErr = _er[1];

  var go = async function() {
    if (!email || !pw) return setErr("Fill in both fields");
    if (pw.length < 6) return setErr("Password needs 6+ chars");
    setLd(true); setErr("");
    try {
      if (m === "signup") {
        var d = await api.signup(email, pw);
        if (d.access_token) { onAuth(d); }
        else { setM("login"); setErr("Check email to confirm, then log in!"); }
      } else {
        var d2 = await api.login(email, pw);
        onAuth(d2);
      }
    } catch(e) { setErr(e.message); }
    setLd(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fi" style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:52,marginBottom:6,filter:"drop-shadow(0 0 20px rgba(180,165,255,0.3))"}}>🌀</div>
          <h1 style={{fontSize:30,fontWeight:800,letterSpacing:"-1px"}}>Plural</h1>
          <p style={{color:T.t2,fontSize:14,marginTop:4}}>A space for every part of you</p>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {["login","signup"].map(function(x) {
            return (
              <button key={x} onClick={function(){setM(x);setErr("");}} style={Object.assign({},BT,{flex:1,background:m===x?T.s2:"transparent",color:m===x?T.tx:T.t3,border:"1px solid "+(m===x?T.bd:"transparent")})}>
                {x==="login"?"Log In":"Sign Up"}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input type="email" placeholder="Email" value={email} onChange={function(e){setEmail(e.target.value);}} style={IS}
            onFocus={function(e){e.target.style.borderColor=T.ac;}} onBlur={function(e){e.target.style.borderColor=T.bd;}}
            onKeyDown={function(e){if(e.key==="Enter")go();}} />
          <input type="password" placeholder="Password" value={pw} onChange={function(e){setPw(e.target.value);}} style={IS}
            onFocus={function(e){e.target.style.borderColor=T.ac;}} onBlur={function(e){e.target.style.borderColor=T.bd;}}
            onKeyDown={function(e){if(e.key==="Enter")go();}} />
          {err && <p style={{color:err.indexOf("confirm")>-1?T.wn:T.er,fontSize:12,textAlign:"center"}}>{err}</p>}
          <button onClick={go} disabled={ld} style={Object.assign({},BP,{width:"100%",marginTop:2,opacity:ld?0.6:1})}>
            {ld ? <Spin /> : m==="login" ? "Log In" : "Create Account"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ===== SETUP =====
function Setup({token, userId, onDone}) {
  var _st = useState(1), step=_st[0], setStep=_st[1];
  var _sn = useState(""), sn=_sn[0], setSn=_sn[1];
  var _an = useState(""), an=_an[0], setAn=_an[1];
  var _ap = useState(""), ap=_ap[0], setAp=_ap[1];
  var _ac = useState(COLORS[5]), ac=_ac[0], setAc=_ac[1];
  var _ae = useState("🌀"), ae=_ae[0], setAe=_ae[1];
  var _ld = useState(false), ld=_ld[0], setLd=_ld[1];

  var finish = async function() {
    if (!sn.trim() || !an.trim()) return;
    setLd(true);
    try {
      var res = await api.post("systems", {user_id:userId, display_name:sn.trim(), system_code:genCode()}, token);
      var sysObj = res[0];
      var res2 = await api.post("alters", {system_id:sysObj.id, name:an.trim(), pronouns:ap.trim(), color:ac, avatar_emoji:ae}, token);
      onDone(sysObj, [res2[0]]);
    } catch(e) {
      try {
        var res3 = await api.post("systems", {user_id:userId, display_name:sn.trim(), system_code:genCode()}, token);
        var res4 = await api.post("alters", {system_id:res3[0].id, name:an.trim(), pronouns:ap.trim(), color:ac, avatar_emoji:ae}, token);
        onDone(res3[0], [res4[0]]);
      } catch(e2) { alert(e2.message); }
    }
    setLd(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fi" style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>
            {[1,2].map(function(i){return <div key={i} style={{width:40,height:4,borderRadius:2,background:step>=i?T.ac:T.bd}} />;})}
          </div>
          <h2 style={{fontSize:22,fontWeight:600}}>{step===1?"Name your system":"Create your first alter"}</h2>
        </div>
        {step===1 ? (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input placeholder="e.g. The Aurora System" value={sn} onChange={function(e){setSn(e.target.value);}} style={IS}
              onKeyDown={function(e){if(e.key==="Enter"&&sn.trim())setStep(2);}} />
            <button onClick={function(){setStep(2);}} disabled={!sn.trim()} style={Object.assign({},BP,{opacity:sn.trim()?1:0.4})}>Next</button>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input placeholder="Alter name" value={an} onChange={function(e){setAn(e.target.value);}} style={IS} />
            <input placeholder="Pronouns (optional)" value={ap} onChange={function(e){setAp(e.target.value);}} style={IS} />
            <div>
              <p style={{fontSize:12,color:T.t2,marginBottom:6}}>Color</p>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {COLORS.map(function(c){return <div key={c} onClick={function(){setAc(c);}} style={{width:30,height:30,borderRadius:"50%",background:c,cursor:"pointer",border:ac===c?"3px solid white":"3px solid transparent",transition:"all .15s"}} />;})}
              </div>
            </div>
            <div>
              <p style={{fontSize:12,color:T.t2,marginBottom:6}}>Emoji</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {EMOJIS.map(function(em){return <div key={em} onClick={function(){setAe(em);}} style={{width:34,height:34,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer",background:ae===em?T.s3:"transparent",border:ae===em?"1px solid "+T.bd2:"1px solid transparent"}}>{em}</div>;})}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={function(){setStep(1);}} style={Object.assign({},BGh,{flex:1})}>Back</button>
              <button onClick={finish} disabled={!an.trim()||ld} style={Object.assign({},BP,{flex:2,opacity:an.trim()&&!ld?1:0.4})}>
                {ld ? <Spin /> : "Let's go ✨"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== MAIN =====

  var tk = session.access_token;

  var _ct = useState(null), chatTarget=_ct[0], setChatTarget=_ct[1];
  var _ag = useState(null), activeGroup=_ag[0], setActiveGroup=_ag[1];
  var _msgs = useState([]), msgs=_msgs[0], setMsgs=_msgs[1];
  var _mi = useState(""), msgIn=_mi[0], setMsgIn=_mi[1];
  var _sending = useState(false), sending=_sending[0], setSending=_sending[1];
  var endRef = useRef(null);
  var pollRef = useRef(null);
  var _toast = useState(null), toast=_toast[0], setToast=_toast[1];
  var _sc = useState(""), searchCode=_sc[0], setSearchCode=_sc[1];
  var _sr = useState(null), searchRes=_sr[0], setSearchRes=_sr[1];
  var _sl = useState(false), searchLd=_sl[0], setSearchLd=_sl[1];
  var _na = useState({name:"",pronouns:"",color:COLORS[0],avatar_emoji:"⭐"}), newAlt=_na[0], setNewAlt=_na[1];
  var _ed = useState(null), editing=_ed[0], setEditing=_ed[1];
  var _ng = useState({name:"",emoji:"🌐",color:COLORS[4],members:[]}), newGroup=_ng[0], setNewGroup=_ng[1];

  var loadConns = useCallback(async function() {
    try {
      var ac2 = await api.get("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);
      var pd = await api.get("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);
      var allIds = ac2.flatMap(function(c){return [c.requester_id,c.receiver_id];}).concat(pd.map(function(p){return p.requester_id;}));
      var ids = allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i;});
      if (ids.length>0) {
        var ss = await api.get("systems","id=in.("+ids.join(",")+")",tk);
        var aa = await api.get("alters","system_id=in.("+ids.join(",")+")",tk);
        var am = {};
        aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a);});
        setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o;})});}).filter(function(c){return c.otherSystem;}));
        setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id;})});}).filter(function(p){return p.otherSystem;}));
        setConnAlts(am);
      } else { setConns([]); setPending(pd); }
    } catch(e) { console.error(e); }
  },[sys.id,tk]);

  var loadGroups = useCallback(async function() {
    try {
      var mg = await api.get("group_members","system_id=eq."+sys.id+"&select=group_id",tk);
      if (mg.length>0) {
        var gids = mg.map(function(g){return g.group_id;});
        var gs = await api.get("groups","id=in.("+gids.join(",")+")",tk);
        setGroups(gs);
        var mb = await api.get("group_members","group_id=in.("+gids.join(",")+")",tk);
        var mm = {};
        mb.forEach(function(m){if(!mm[m.group_id])mm[m.group_id]=[];mm[m.group_id].push(m);});
        setGroupMembers(mm);
      } else { setGroups([]); }
    } catch(e) { console.error(e); }
  },[sys.id,tk]);

  useEffect(function(){loadConns();loadGroups();},[loadConns,loadGroups]);

  useEffect(function(){
    if(view!=="chat"||!chatTarget||!active)return;

      try{
        var my=active.id,th=chatTarget.alter.id;
        var result=await api.get("messages","or=(and(sender_alter_id.eq."+my+",receiver_alter_id.eq."+th+"),and(sender_alter_id.eq."+th+",receiver_alter_id.eq."+my+"))&order=created_at.asc",tk);
        setMsgs(result);
      }catch(e){}

    load();

    return function(){clearInterval(pollRef.current);};

    return function(){clearInterval(pollRef.current);};
  },[view,activeGroup&&activeGroup.id,tk]);

  var sendDM = async function() {

    setSending(false);
  };
  var sendGM = async function() {

    try{var res=await api.post("group_messages",{group_id:activeGroup.id,sender_alter_id:active.id,content:c},tk);setMsgs(function(p){return p.concat([res[0]]);});}
    catch(e){setToast({msg:"Send failed",type:"error"});}
    setSending(false);
  };
  var searchSys = async function() {
    if(!searchCode.trim())return;setSearchLd(true);setSearchRes(null);
    try{var r=await api.get("systems","system_code=eq."+searchCode.trim().toUpperCase(),tk);
      if(!r.length)setSearchRes({none:true});
      else if(r[0].id===sys.id)setSearchRes({self:true});
      else{var a=await api.get("alters","system_id=eq."+r[0].id,tk);setSearchRes({sys:r[0],alts:a});}
    }catch(e){setToast({msg:"Search failed",type:"error"});}setSearchLd(false);
  };
  var sendReq = async function(id){try{await api.post("connections",{requester_id:sys.id,receiver_id:id},tk);setToast({msg:"Request sent!",type:"success"});setSearchRes(null);setSearchCode("");}catch(e){setToast({msg:"Already connected",type:"error"});}};

  var addAlterFn = async function(){if(!newAlt.name.trim())return;try{var res=await api.post("alters",{system_id:sys.id,name:newAlt.name.trim(),pronouns:newAlt.pronouns,color:newAlt.color,avatar_emoji:newAlt.avatar_emoji},tk);setAlters(function(p){return p.concat([res[0]]);});setNewAlt({name:"",pronouns:"",color:COLORS[Math.floor(Math.random()*10)],avatar_emoji:"⭐"});setView("list");setToast({msg:res[0].name+" joined!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};

  var createGroup = async function(){if(!newGroup.name.trim())return;try{var res=await api.post("groups",{name:newGroup.name.trim(),emoji:newGroup.emoji,color:newGroup.color,created_by:sys.id},tk);await api.post("group_members",{group_id:res[0].id,system_id:sys.id},tk);for(var i=0;i<newGroup.members.length;i++){await api.post("group_members",{group_id:res[0].id,system_id:newGroup.members[i]},tk);}setNewGroup({name:"",emoji:"🌐",color:COLORS[4],members:[]});setView("list");loadGroups();setToast({msg:"Group created!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};

                    <div style={{display:"flex",gap:5}}>
                      <button onClick={function(){acceptReq(p.id);}} style={Object.assign({},BT,{padding:"5px 10px",background:T.ok,color:"#0a0b10",fontSize:12})}><ICheck size={13}/></button>
                      <button onClick={function(){rejectReq(p.id);}} style={Object.assign({},BGh,{padding:"5px 10px",fontSize:12})}><IX size={13}/></button>

                  </div>

            <button onClick={function(){setView("addContact");}} style={Object.assign({},BGh,{width:"100%",marginBottom:14,padding:12,borderStyle:"dashed",fontSize:13})}><IUserPlus size={14}/> Add by system code</button>

            ) : conns.map(function(conn) {

                    {ex?<IChevDown size={14} color={T.t3}/>:<IChevRight size={14} color={T.t3}/>}

            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="Group name" value={newGroup.name} onChange={function(e){setNewGroup(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <div><p style={{fontSize:11,color:T.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{GROUP_EMOJIS.map(function(em){return <div key={em} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{emoji:em});});}} style={{width:34,height:34,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer",background:newGroup.emoji===em?T.s3:"transparent",border:newGroup.emoji===em?"1px solid "+T.bd2:"1px solid transparent"}}>{em}</div>;})}</div></div>
              <div><p style={{fontSize:11,color:T.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{COLORS.map(function(c){return <div key={c} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{color:c});});}} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:newGroup.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              {conns.length>0 && (
                <div><p style={{fontSize:11,color:T.t2,marginBottom:5}}>Add systems</p>
                  {conns.map(function(c){var s=c.otherSystem;var sel=newGroup.members.indexOf(s.id)>-1;
                    return <div key={s.id} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{members:sel?p.members.filter(function(x){return x!==s.id;}):p.members.concat([s.id])});});}} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:8,cursor:"pointer",background:sel?T.ac+"15":"transparent",border:sel?"1px solid "+T.ac+"33":"1px solid transparent"}}>
                      <div style={{width:20,height:20,borderRadius:4,border:"2px solid "+(sel?T.ac:T.bd),background:sel?T.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<ICheck size={12} color="#0a0b10"/>}</div>
                      <span style={{fontWeight:500,fontSize:13}}>{s.display_name}</span>
                    </div>;
                  })}
                </div>
              )}
              <button onClick={createGroup} disabled={!newGroup.name.trim()} style={Object.assign({},BP,{marginTop:6,opacity:newGroup.name.trim()?1:0.4})}>Create Group</button>
            </div>
          </div>
        )}

        {/* DM CHAT */}
        {view==="chat"&&chatTarget && (
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:5}}>
              {msgs.length===0 && <div style={{textAlign:"center",padding:32,color:T.t3}}><p style={{fontSize:13}}>Start chatting</p><p style={{marginTop:3}}><span style={{color:active.color,fontWeight:600}}>{active.name}</span>{" & "}<span style={{color:chatTarget.alter.color,fontWeight:600}}>{chatTarget.alter.name}</span></p></div>}
              {msgs.map(function(m){var mine=m.sender_alter_id===active.id;var sa=mine?active:chatTarget.alter;
                return <div key={m.id} style={{display:"flex",justifyContent:mine?"flex-end":"flex-start"}} className="fi">
                  <div style={{maxWidth:"80%",display:"flex",gap:5,flexDirection:mine?"row-reverse":"row",alignItems:"flex-end"}}>
                    <Badge alter={sa} sz={22}/>
                    <div style={{padding:"9px 13px",borderRadius:14,borderBottomRightRadius:mine?3:14,borderBottomLeftRadius:mine?14:3,background:mine?sa.color+"28":T.s2,border:"1px solid "+(mine?sa.color+"35":T.bd)}}>
                      <p style={{fontSize:13.5,lineHeight:1.45,wordBreak:"break-word"}}>{m.content}</p>
                      <p style={{fontSize:9,color:T.t3,marginTop:3,textAlign:mine?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                    </div>
                  </div>
                </div>;
              })}
              <div ref={endRef}/>
            </div>
          </div>
        )}

        {/* GROUP CHAT */}
        {view==="groupChat"&&activeGroup && (
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:5}}>
              {msgs.length===0 && <div style={{textAlign:"center",padding:32,color:T.t3}}><div style={{fontSize:28,marginBottom:6}}>{activeGroup.emoji}</div><p style={{fontSize:14,fontWeight:500}}>{activeGroup.name}</p><p style={{fontSize:12,marginTop:2}}>No messages yet</p></div>}
              {msgs.map(function(m){var mine=alters.some(function(a){return a.id===m.sender_alter_id;});var sa=allAlters[m.sender_alter_id]||{name:"?",color:"#888",avatar_emoji:"❓"};
                return <div key={m.id} style={{display:"flex",justifyContent:mine?"flex-end":"flex-start"}} className="fi">
                  <div style={{maxWidth:"80%",display:"flex",gap:5,flexDirection:mine?"row-reverse":"row",alignItems:"flex-end"}}>
                    <Badge alter={sa} sz={22}/>
                    <div style={{padding:"9px 13px",borderRadius:14,borderBottomRightRadius:mine?3:14,borderBottomLeftRadius:mine?14:3,background:mine?sa.color+"28":T.s2,border:"1px solid "+(mine?sa.color+"35":T.bd)}}>
                      <p style={{fontSize:10,color:sa.color,fontWeight:600,marginBottom:2}}>{sa.name}</p>
                      <p style={{fontSize:13.5,lineHeight:1.45,wordBreak:"break-word"}}>{m.content}</p>
                      <p style={{fontSize:9,color:T.t3,marginTop:3,textAlign:mine?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                    </div>
                  </div>
                </div>;
              })}
              <div ref={endRef}/>
            </div>
          </div>
        )}
      </div>

      {/* MSG INPUT */}
      {inChat && (
        <div style={{padding:"10px 14px",background:T.s1,borderTop:"1px solid "+T.bd,display:"flex",gap:7,flexShrink:0}}>
          <input value={msgIn} onChange={function(e){setMsgIn(e.target.value);}} placeholder={"Message as "+active.name+"..."}
            style={Object.assign({},IS,{flex:1,borderColor:active.color+"33"})}
            onFocus={function(e){e.target.style.borderColor=active.color;}} onBlur={function(e){e.target.style.borderColor=active.color+"33";}}
            onKeyDown={function(e){if(e.key==="Enter"){view==="chat"?sendDM():sendGM();}}} />
          <button onClick={view==="chat"?sendDM:sendGM} disabled={!msgIn.trim()||sending}
            style={Object.assign({},BT,{padding:"11px 14px",background:active.color,color:"#0a0b10",opacity:msgIn.trim()&&!sending?1:0.4})}>
            <ISend size={15}/>
          </button>
        </div>
      )}

      {/* EDIT MODAL */}
      {editing && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:14,zIndex:100}} onClick={function(){setEditing(null);}}>
          <div className="pop" onClick={function(e){e.stopPropagation();}} style={{background:T.s1,borderRadius:T.r,padding:20,width:"100%",maxWidth:360,border:"1px solid "+T.bd,maxHeight:"85vh",overflow:"auto"}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:14}}>Edit {editing.name}</h3>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input value={editing.name} onChange={function(e){setEditing(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <input value={editing.pronouns} onChange={function(e){setEditing(function(p){return Object.assign({},p,{pronouns:e.target.value});});}} placeholder="Pronouns" style={IS}/>
              <div><p style={{fontSize:11,color:T.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{COLORS.map(function(c){return <div key={c} onClick={function(){setEditing(function(p){return Object.assign({},p,{color:c});});}} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:editing.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              <div><p style={{fontSize:11,color:T.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{EMOJIS.map(function(em){return <div key={em} onClick={function(){setEditing(function(p){return Object.assign({},p,{avatar_emoji:em});});}} style={{width:30,height:30,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer",background:editing.avatar_emoji===em?T.s3:"transparent"}}>{em}</div>;})}</div></div>
              <div style={{display:"flex",gap:7,marginTop:6}}>
                <button onClick={function(){setEditing(null);}} style={Object.assign({},BGh,{flex:1})}>Cancel</button>
                <button onClick={saveEdit} style={Object.assign({},BP,{flex:1})}>Save</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== ROOT =====
function App() {
  var _s = useState(null), session=_s[0], setSession=_s[1];
  var _sys = useState(null), sys=_sys[0], setSys=_sys[1];
  var _alts = useState(null), alts=_alts[0], setAlts=_alts[1];
  var _ld = useState(true), loading=_ld[0], setLoading=_ld[1];

  useEffect(function() {
    var saved = store.get("plural_session");
    if (saved) {
      (async function() {
        try {
          var s = await api.get("systems", "user_id=eq." + saved.user.id, saved.access_token);
          if (s.length > 0) {
            var a = await api.get("alters", "system_id=eq." + s[0].id + "&order=created_at.asc", saved.access_token);
            setSession(saved); setSys(s[0]); setAlts(a);
          } else { setSession(saved); }
        } catch(e) { store.del("plural_session"); }
        setLoading(false);
      })();
    } else { setLoading(false); }
  }, []);

  var handleAuth = useCallback(async function(d) {
    setSession(d); store.set("plural_session", d);
    try {
      var s = await api.get("systems", "user_id=eq." + d.user.id, d.access_token);
      if (s.length > 0) {
        setSys(s[0]);
        var a = await api.get("alters", "system_id=eq." + s[0].id + "&order=created_at.asc", d.access_token);
        setAlts(a);
      }
    } catch(e) {}
    setLoading(false);
  }, []);

  var handleSetup = function(s, a) { setSys(s); setAlts(a); };
  var handleLogout = function() { store.del("plural_session"); setSession(null); setSys(null); setAlts(null); };

  if (loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg}}><Spin sz={28}/></div>;
  if (!session) return <Auth onAuth={handleAuth} />;
  if (!sys || !alts || !alts.length) return <Setup token={session.access_token} userId={session.user.id} onDone={handleSetup} />;
  return <Main session={session} system={sys} alters={alts} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

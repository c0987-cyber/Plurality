      <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div className="scr" style={{display:"flex",gap:3,flexWrap:"wrap",maxHeight:110}}>{EMO.map(function(em){return <div key={em} onClick={function(){setAe(em)}} style={{width:28,height:28,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",background:ae===em?C.s3:"transparent"}}>{em}</div>})}</div></div>
      <div style={{display:"flex",gap:8,marginTop:4}}><button onClick={function(){setStep(1)}} style={Object.assign({},BT,{flex:1,background:"transparent",color:C.t2,border:"1px solid "+C.bd})}>Back</button><button onClick={finish} disabled={!an.trim()||ld} style={Object.assign({},BT,{flex:2,background:C.ac,color:"#0a0b10",opacity:an.trim()&&!ld?1:.4})}>{ld?<Spin/>:"Continue"}</button></div>
    </div>}
  </div></div>
}

// ===== MAIN =====
function Main({session,system:initSys,alters:initAlts,onLogout,onRefresh}){
  var tk=session.access_token;
  var _sys=useState(initSys),sys=_sys[0];
  var _alters=useState(initAlts),alters=_alters[0],setAlters=_alters[1];
  var _active=useState(initAlts[0]),active=_active[0],setActive=_active[1];
  var _conns=useState([]),conns=_conns[0],setConns=_conns[1];
  var _ca=useState({}),connAlts=_ca[0],setConnAlts=_ca[1];
  var _pending=useState([]),pending=_pending[0],setPending=_pending[1];
  var _groups=useState([]),groups=_groups[0],setGroups=_groups[1];
  var _gm=useState({}),groupMembers=_gm[0],setGroupMembers=_gm[1];
  var _drawer=useState(false),drawer=_drawer[0],setDrawer=_drawer[1];
  var _drawerExp=useState({}),drawerExp=_drawerExp[0],setDrawerExp=_drawerExp[1];
  var _view=useState("home"),view=_view[0],setView=_view[1];
  var _sliding=useState(false),sliding=_sliding[0],setSliding=_sliding[1]; // slide out animation
  var _ct=useState(null),chatTarget=_ct[0],setChatTarget=_ct[1];
  var _ag=useState(null),activeGroup=_ag[0],setActiveGroup=_ag[1];
  var _msgs=useState([]),msgs=_msgs[0],setMsgs=_msgs[1];
  var _mi=useState(""),msgIn=_mi[0],setMsgIn=_mi[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _toast=useState(null),toast=_toast[0],setToast=_toast[1];
  var _sc=useState(""),searchCode=_sc[0],setSearchCode=_sc[1];
  var _sr=useState(null),searchRes=_sr[0],setSearchRes=_sr[1];
  var _sl=useState(false),searchLd=_sl[0],setSearchLd=_sl[1];
  var _na=useState({name:"",pronouns:"",color:COLS[0],avatar_emoji:"⭐"}),newAlt=_na[0],setNewAlt=_na[1];
  var _ed=useState(null),editing=_ed[0],setEditing=_ed[1];
  var _ng=useState({name:"",emoji:"🌐",color:COLS[4],members:[]}),newGroup=_ng[0],setNewGroup=_ng[1];
  var _lastMsgs=useState({}),lastMsgs=_lastMsgs[0],setLastMsgs=_lastMsgs[1];
  var _chatTabOpen=useState(false),chatTabOpen=_chatTabOpen[0],setChatTabOpen=_chatTabOpen[1];
  var _prevMsgCount=useState(0),prevMsgCount=_prevMsgCount[0],setPrevMsgCount=_prevMsgCount[1];
  var endRef=useRef(null);var pollRef=useRef(null);var fileRef=useRef(null);
  // Refs for horizontal scroll areas to exclude from swipe
  var alterBarRef=useRef(null);var tabBarRef=useRef(null);var headerAlterRef=useRef(null);

  var inChat=view==="chat"||view==="groupChat";

  // Init notifications
  useEffect(function(){initNotifs()},[]);

  // Slide out then navigate
  var exitChat=function(){
    setSliding(true);
    setTimeout(function(){setView("home");setSliding(false);clearInterval(pollRef.current)},200);
  };

  var swipe=useSwipe(
    function(){if(inChat)exitChat();else if(!drawer)setDrawer(true)},
    function(){if(drawer)setDrawer(false)},
    [alterBarRef,tabBarRef,headerAlterRef] // exclude these from swipe detection
  );

  // ---- DATA ----
  var loadConns=useCallback(async function(){try{
    var ac2=await D.g("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);
    var pd=await D.g("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);
    var allIds=ac2.flatMap(function(c){return[c.requester_id,c.receiver_id]}).concat(pd.map(function(p){return p.requester_id}));
    var ids=allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i});
    if(ids.length>0){var ss=await D.g("systems","id=in.("+ids.join(",")+")",tk);var aa=await D.g("alters","system_id=in.("+ids.join(",")+")",tk);var am={};aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a)});
      setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o})})}).filter(function(c){return c.otherSystem}));
      setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id})})}).filter(function(p){return p.otherSystem}));setConnAlts(am)}
    else{setConns([]);setPending(pd)}
  }catch(e){if(e.message==="AUTH"&&onRefresh)onRefresh()}},[sys.id,tk]);
  var loadGroups=useCallback(async function(){try{var mg=await D.g("group_members","system_id=eq."+sys.id+"&select=group_id",tk);if(mg.length>0){var gids=mg.map(function(g){return g.group_id});var gs=await D.g("groups","id=in.("+gids.join(",")+")",tk);setGroups(gs);var mb=await D.g("group_members","group_id=in.("+gids.join(",")+")",tk);var mm={};mb.forEach(function(m){if(!mm[m.group_id])mm[m.group_id]=[];mm[m.group_id].push(m)});setGroupMembers(mm)}else setGroups([])}catch(e){}},[sys.id,tk]);
  useEffect(function(){loadConns();loadGroups()},[loadConns,loadGroups]);
  useEffect(function(){var iv=setInterval(loadConns,10000);return function(){clearInterval(iv)}},[loadConns]);

  // Last msgs per active alter
  useEffect(function(){if(!conns.length||!active)return;var ll=async function(){var lm={};var myId=active.id;for(var i=0;i<conns.length;i++){var s=conns[i].otherSystem;var sa=connAlts[s.id]||[];if(!sa.length)continue;var tIds=sa.map(function(a){return a.id});try{var r=await D.g("messages","or=(and(sender_alter_id.eq."+myId+",receiver_alter_id.in.("+tIds.join(",")+")),and(sender_alter_id.in.("+tIds.join(",")+"),receiver_alter_id.eq."+myId+"))&order=created_at.desc&limit=1",tk);if(r.length)lm[s.id]=r[0]}catch(e){}}setLastMsgs(lm)};ll();var iv=setInterval(ll,8000);return function(){clearInterval(iv)}},[conns,connAlts,active,tk]);

  // Poll chat + notifications
  useEffect(function(){if(view!=="chat"||!chatTarget)return;var load=async function(){try{var my=chatTarget.myAlter.id,th=chatTarget.theirAlter.id;var newMsgs=await D.g("messages","or=(and(sender_alter_id.eq."+my+",receiver_alter_id.eq."+th+"),and(sender_alter_id.eq."+th+",receiver_alter_id.eq."+my+"))&order=created_at.asc",tk);
    // Notify on new messages
    if(newMsgs.length>prevMsgCount&&prevMsgCount>0){var last=newMsgs[newMsgs.length-1];if(last.sender_alter_id!==my){notify(chatTarget.theirAlter.name,isImg(last.content)?"Sent a photo":last.content)}}
    setPrevMsgCount(newMsgs.length);setMsgs(newMsgs)}catch(e){}};
    load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current)}},[view,chatTarget&&chatTarget.myAlter.id,chatTarget&&chatTarget.theirAlter.id,tk]);
  useEffect(function(){if(view!=="groupChat"||!activeGroup)return;var load=async function(){try{setMsgs(await D.g("group_messages","group_id=eq."+activeGroup.id+"&order=created_at.asc",tk))}catch(e){}};load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current)}},[view,activeGroup&&activeGroup.id,tk]);
  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"})},[msgs]);

  // ---- ACTIONS ----
  var openDM=function(myAlt,theirAlt,otherSys){setChatTarget({system:otherSys,myAlter:myAlt,theirAlter:theirAlt});setActive(myAlt);setMsgs([]);setPrevMsgCount(0);setView("chat");setDrawer(false);setChatTabOpen(false)};
  var openDMDefault=function(otherSys){var sa=connAlts[otherSys.id]||[];if(sa.length)openDM(active,sa[0],otherSys)};
  var switchConvo=function(myAlt,theirAlt){setChatTarget(function(prev){return{system:prev.system,myAlter:myAlt,theirAlter:theirAlt}});setActive(myAlt);setMsgs([]);setPrevMsgCount(0);setChatTabOpen(false)};
  var openGrp=function(g){setActiveGroup(g);setMsgs([]);setView("groupChat");setDrawer(false)};
  var sendDM=async function(){if(!msgIn.trim()||!chatTarget||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await D.p("messages",{sender_alter_id:chatTarget.myAlter.id,receiver_alter_id:chatTarget.theirAlter.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]])})}catch(e){setToast({msg:"Failed",type:"error"})}setSending(false)};
  var sendGM=async function(){if(!msgIn.trim()||!activeGroup||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await D.p("group_messages",{group_id:activeGroup.id,sender_alter_id:active.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]])})}catch(e){setToast({msg:"Failed",type:"error"})}setSending(false)};
  // Photo send
  var sendPhoto=async function(file){if(!file||!chatTarget)return;setSending(true);try{var url=await D.upload(file,tk);var r=await D.p("messages",{sender_alter_id:chatTarget.myAlter.id,receiver_alter_id:chatTarget.theirAlter.id,content:url},tk);setMsgs(function(p){return p.concat([r[0]])})}catch(e){setToast({msg:"Photo failed — check storage setup",type:"error"})}setSending(false)};
  var deleteMsg=async function(id){try{await D.dl("messages","id=eq."+id,tk);setMsgs(function(p){return p.filter(function(m){return m.id!==id})})}catch(e){}};
  var searchSys=async function(){if(!searchCode.trim())return;setSearchLd(true);setSearchRes(null);try{var r=await D.g("systems","system_code=eq."+searchCode.trim().toUpperCase(),tk);if(!r.length)setSearchRes({none:true});else if(r[0].id===sys.id)setSearchRes({self:true});else{var a=await D.g("alters","system_id=eq."+r[0].id,tk);setSearchRes({sys:r[0],alts:a})}}catch(e){}setSearchLd(false)};
  var sendReq=async function(id){try{await D.p("connections",{requester_id:sys.id,receiver_id:id},tk);setToast({msg:"Sent!",type:"success"});setSearchRes(null);setSearchCode("");loadConns()}catch(e){setToast({msg:"Already connected",type:"error"})}};
  var acceptReq=async function(id){try{await D.pa("connections","id=eq."+id,{status:"accepted"},tk);setToast({msg:"Connected!",type:"success"});loadConns()}catch(e){}};
  var rejectReq=async function(id){try{await D.dl("connections","id=eq."+id,tk);loadConns()}catch(e){}};
  var unfriend=async function(cid,n){if(!confirm("Unfriend "+n+"?"))return;try{await D.dl("connections","id=eq."+cid,tk);loadConns()}catch(e){}};
  var addAlterFn=async function(){if(!newAlt.name.trim())return;try{var r=await D.p("alters",{system_id:sys.id,name:newAlt.name.trim(),pronouns:newAlt.pronouns,color:newAlt.color,avatar_emoji:newAlt.avatar_emoji},tk);setAlters(function(p){return p.concat([r[0]])});setNewAlt({name:"",pronouns:"",color:COLS[Math.floor(Math.random()*COLS.length)],avatar_emoji:"⭐"});setView("home");setToast({msg:r[0].name+" added!",type:"success"})}catch(e){setToast({msg:e.message,type:"error"})}};
  var delAlter=async function(id){if(alters.length<=1)return;try{await D.dl("alters","id=eq."+id,tk);var u=alters.filter(function(a){return a.id!==id});setAlters(u);if(active.id===id)setActive(u[0])}catch(e){}};
  var saveEdit=async function(){if(!editing)return;try{var r=await D.pa("alters","id=eq."+editing.id,{name:editing.name,pronouns:editing.pronouns,color:editing.color,avatar_emoji:editing.avatar_emoji},tk);setAlters(function(p){return p.map(function(a){return a.id===r[0].id?r[0]:a})});if(active.id===r[0].id)setActive(r[0]);setEditing(null);setToast({msg:"Saved!",type:"success"})}catch(e){}};
  var createGroup=async function(){if(!newGroup.name.trim())return;try{var r=await D.p("groups",{name:newGroup.name.trim(),emoji:newGroup.emoji,color:newGroup.color,created_by:sys.id},tk);await D.p("group_members",{group_id:r[0].id,system_id:sys.id},tk);for(var i=0;i<newGroup.members.length;i++)await D.p("group_members",{group_id:r[0].id,system_id:newGroup.members[i]},tk);setNewGroup({name:"",emoji:"🌐",color:COLS[4],members:[]});setView("home");loadGroups();setToast({msg:"Created!",type:"success"})}catch(e){setToast({msg:e.message,type:"error"})}};
  var copyCode=function(){if(navigator.clipboard)navigator.clipboard.writeText(sys.system_code);setToast({msg:"Copied!",type:"success"})};
  var nav=function(v){setView(v);setDrawer(false)};
  var allAlters=useMemo(function(){var m={};alters.forEach(function(a){m[a.id]=a});Object.values(connAlts).flat().forEach(function(a){m[a.id]=a});return m},[alters,connAlts]);
  var sortedConns=useMemo(function(){return conns.slice().sort(function(a,b){var la=lastMsgs[a.otherSystem.id],lb=lastMsgs[b.otherSystem.id];if(!la&&!lb)return 0;if(!la)return 1;if(!lb)return-1;return new Date(lb.created_at)-new Date(la.created_at)})},[conns,lastMsgs]);

  // Render message content (text or image)
  function MsgContent({content}){
    if(isImg(content))return <img src={content} style={{maxWidth:"100%",maxHeight:240,borderRadius:8,display:"block",marginTop:2}} onLoad={function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"})}}/>;
    return <p className="mt" style={{fontSize:13,lineHeight:1.4,wordBreak:"break-word"}}>{content}</p>
  }

  return (
    <div style={{height:"100%",display:"flex",overflow:"hidden"}} {...swipe}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null)}}/>}
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){if(e.target.files&&e.target.files[0]){sendPhoto(e.target.files[0]);e.target.value=""}}}/>

      {/* DRAWER OVERLAY */}
      {drawer&&<div onClick={function(){setDrawer(false)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:50,transition:"opacity .2s"}}/>}

      {/* SIDE DRAWER */}
      <div style={{position:"fixed",left:0,top:0,bottom:0,width:280,background:C.side,borderRight:"1px solid "+C.bd,zIndex:51,transform:drawer?"translateX(0)":"translateX(-100%)",transition:"transform .25s cubic-bezier(.4,0,.2,1)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:12,borderBottom:"1px solid "+C.bd}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <Badge a={active} sz={30} on/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sys.display_name}</div><div style={{fontSize:10,color:C.t3,display:"flex",alignItems:"center",gap:3}}><span style={{letterSpacing:1}}>{sys.system_code}</span><button className="hov" onClick={copyCode} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}><ICopy sz={9} c={C.t3}/></button></div></div>
          </div>
          <div ref={alterBarRef} className="sx" style={{display:"flex",gap:4,paddingBottom:2}}>
            {alters.map(function(a){return <div key={a.id} onClick={function(){setActive(a)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer",flexShrink:0}}><Badge a={a} sz={22} on={active.id===a.id}/><span style={{fontSize:7,color:active.id===a.id?a.color:C.t3,fontWeight:active.id===a.id?700:400}}>{a.name.substring(0,4)}</span></div>})}
            <div onClick={function(){nav("addAlter")}} style={{width:22,height:22,borderRadius:"50%",border:"1px dashed "+C.bd,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}><IPlus sz={7} c={C.t3}/></div>
          </div>
        </div>
        <div className="scr" style={{flex:1,padding:"4px 4px"}}>
          {/* HOME */}
          <button className="hov" onClick={function(){nav("home")}} style={Object.assign({},BT,{width:"100%",padding:"8px 10px",background:view==="home"?C.s3:"transparent",color:view==="home"?C.tx:C.t2,border:"none",fontSize:13,justifyContent:"flex-start",gap:8,borderRadius:8})}><IHome sz={14}/>Home{pending.length>0&&<span style={{marginLeft:"auto",minWidth:16,height:16,borderRadius:8,background:C.er,color:"white",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{pending.length}</span>}</button>
          <button className="hov" onClick={function(){nav("addContact")}} style={Object.assign({},BT,{width:"100%",padding:"8px 10px",background:"transparent",color:C.t2,border:"none",fontSize:13,justifyContent:"flex-start",gap:8,borderRadius:8})}><IUserPlus sz={14}/>Add System</button>

          <div style={{height:1,background:C.bd,margin:"6px 8px"}}/>
          <p style={{fontSize:8,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,padding:"4px 10px"}}>Connections</p>
          {sortedConns.map(function(conn){var s=conn.otherSystem,sa=connAlts[s.id]||[],exp=drawerExp[s.id];
            return <div key={conn.id}><div className="hov" style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,cursor:"pointer"}} onClick={function(){setDrawerExp(function(p){var n=Object.assign({},p);n[s.id]=!p[s.id];return n})}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:C.s3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:C.t2}}>{s.display_name.charAt(0)}</div>
              <span style={{flex:1,fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.display_name}</span>
              <span style={{fontSize:9,color:C.t3}}>{sa.length}</span>
              {exp?<IChevDown sz={10} c={C.t3}/>:<IChevRight sz={10} c={C.t3}/>}
            </div>
            {exp&&<div style={{paddingLeft:10,paddingBottom:3}}>
              {alters.map(function(myAlt){return <div key={myAlt.id}><p style={{fontSize:8,color:myAlt.color,fontWeight:600,padding:"3px 6px"}}>{myAlt.name}</p>

            </div>}</div>})}

            <div style={{padding:10}}>

          {/* CHAT */}

            {msgs.map(function(m,i){var mine=m.sender_alter_id===chatTarget.myAlter.id;var sa=mine?chatTarget.myAlter:chatTarget.theirAlter;var prev=msgs[i-1];var sameSender=prev&&prev.sender_alter_id===m.sender_alter_id;var prevD=prev?new Date(prev.created_at).toDateString():"";var thisD=new Date(m.created_at).toDateString();

            <div style={{display:"flex",gap:5,marginBottom:10}}><input placeholder="Code" value={searchCode} onChange={function(e){setSearchCode(e.target.value.toUpperCase())}} maxLength={6} style={Object.assign({},IS,{flex:1,letterSpacing:4,fontWeight:700,textAlign:"center",fontSize:18})} onKeyDown={function(e){if(e.key==="Enter")searchSys()}}/><button className="hov" onClick={searchSys} disabled={searchLd} style={Object.assign({},BT,{padding:"10px 14px",background:C.ac,color:"#0a0b10"})}>{searchLd?<Spin sz={14}/>:<ISearch sz={14}/>}</button></div>
            {searchRes&&<div className="fi" style={{background:C.s2,borderRadius:10,padding:10}}>{searchRes.none?<p style={{color:C.t3,textAlign:"center",fontSize:11}}>Not found</p>:searchRes.self?<p style={{color:C.t3,textAlign:"center",fontSize:11}}>That's you</p>:<div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}><div><h3 style={{fontSize:13,fontWeight:600}}>{searchRes.sys.display_name}</h3><p style={{fontSize:10,color:C.t3}}>{searchRes.alts.length} alters</p></div><button className="hov" onClick={function(){sendReq(searchRes.sys.id)}} style={Object.assign({},BT,{fontSize:11,padding:"5px 10px",background:C.ac,color:"#0a0b10",gap:3})}><IPlus sz={10}/>Add</button></div><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{searchRes.alts.map(function(a){return <div key={a.id} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 6px 2px 2px",background:C.s3,borderRadius:10}}><Badge a={a} sz={14}/><span style={{fontSize:9}}>{a.name}</span></div>})}</div></div>}</div>}
          </div>}

              <div><p style={{fontSize:10,color:C.t2,marginBottom:4}}>Color</p><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{color:c})})}} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",border:newAlt.color===c?"2px solid white":"2px solid transparent"}}/>})}</div></div>
              <div><p style={{fontSize:10,color:C.t2,marginBottom:4}}>Emoji</p><div className="scr" style={{display:"flex",gap:2,flexWrap:"wrap",maxHeight:110}}>{EMO.map(function(em){return <div key={em} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{avatar_emoji:em})})}} style={{width:26,height:26,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer",background:newAlt.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>})}</div></div>

              {conns.length>0&&<div><p style={{fontSize:10,color:C.t2,marginBottom:4}}>Systems</p>{conns.map(function(c){var s=c.otherSystem;var sel=newGroup.members.indexOf(s.id)>-1;return <div key={s.id} className="hov" onClick={function(){setNewGroup(function(p){return Object.assign({},p,{members:sel?p.members.filter(function(x){return x!==s.id}):p.members.concat([s.id])})})}} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",borderRadius:6,cursor:"pointer",background:sel?C.ac+"15":"transparent"}}><div style={{width:16,height:16,borderRadius:3,border:"2px solid "+(sel?C.ac:C.bd),background:sel?C.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<ICheck sz={8} c="#0a0b10"/>}</div><span style={{fontSize:12}}>{s.display_name}</span></div>})}</div>}

              <button className="hov" onClick={function(){setEditing(Object.assign({},a))}} style={Object.assign({},BT,{padding:3,background:"transparent",border:"none",color:C.t2})}><IEdit sz={11}/></button>

            <div><p style={{fontSize:9,color:C.t2,marginBottom:3}}>Color</p><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setEditing(function(p){return Object.assign({},p,{color:c})})}} style={{width:18,height:18,borderRadius:"50%",background:c,cursor:"pointer",border:editing.color===c?"2px solid white":"2px solid transparent"}}/>})}</div></div>
            <div><p style={{fontSize:9,color:C.t2,marginBottom:3}}>Emoji</p><div className="scr" style={{display:"flex",gap:2,flexWrap:"wrap",maxHeight:80}}>{EMO.map(function(em){return <div key={em} onClick={function(){setEditing(function(p){return Object.assign({},p,{avatar_emoji:em})})}} style={{width:22,height:22,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,cursor:"pointer",background:editing.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>})}</div></div>
            <div style={{display:"flex",gap:6,marginTop:4}}><button className="hov" onClick={function(){setEditing(null)}} style={Object.assign({},BT,{flex:1,background:"transparent",color:C.t2,border:"1px solid "+C.bd})}>Cancel</button><button className="hov" onClick={saveEdit} style={Object.assign({},BT,{flex:1,background:C.ac,color:"#0a0b10"})}>Save</button></div>
          </div>
        </div>
      </div>}
    </div>
  )
}

// ROOT
function App(){
  var _s=useState(null),session=_s[0],setSession=_s[1];var _sys=useState(null),sys=_sys[0],setSys=_sys[1];var _alts=useState(null),alts=_alts[0],setAlts=_alts[1];var _ld=useState(true),loading=_ld[0],setLoading=_ld[1];
  var tryRefresh=useCallback(async function(){var saved=LS.g("plural_session");if(!saved||!saved.refresh_token)return;try{var d=await D.refresh(saved.refresh_token);var ns={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};LS.s("plural_session",ns);setSession(ns)}catch(e){LS.d("plural_session");setSession(null);setSys(null);setAlts(null)}},[]);
  useEffect(function(){var iv=setInterval(function(){var s=LS.g("plural_session");if(s&&s.refresh_token)D.refresh(s.refresh_token).then(function(d){var ns={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};LS.s("plural_session",ns);setSession(ns)}).catch(function(){})},1800000);return function(){clearInterval(iv)}},[]);
  useEffect(function(){var saved=LS.g("plural_session");if(saved){(async function(){try{var s=await D.g("systems","user_id=eq."+saved.user.id,saved.access_token);if(s.length>0){var a=await D.g("alters","system_id=eq."+s[0].id+"&order=created_at.asc",saved.access_token);setSession(saved);setSys(s[0]);setAlts(a)}else setSession(saved)}catch(e){if(saved.refresh_token){try{var d=await D.refresh(saved.refresh_token);var ns={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};LS.s("plural_session",ns);var s2=await D.g("systems","user_id=eq."+ns.user.id,ns.access_token);if(s2.length>0){var a2=await D.g("alters","system_id=eq."+s2[0].id+"&order=created_at.asc",ns.access_token);setSession(ns);setSys(s2[0]);setAlts(a2)}else setSession(ns)}catch(e2){LS.d("plural_session")}}else LS.d("plural_session")}setLoading(false)})()}else setLoading(false)},[]);
  var handleAuth=useCallback(async function(d){var sess={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};setSession(sess);LS.s("plural_session",sess);try{var s=await D.g("systems","user_id=eq."+d.user.id,d.access_token);if(s.length>0){setSys(s[0]);var a=await D.g("alters","system_id=eq."+s[0].id+"&order=created_at.asc",d.access_token);setAlts(a)}}catch(e){}setLoading(false)},[]);
  if(loading)return <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><Spin sz={28}/></div>;
  if(!session)return <Auth onAuth={handleAuth}/>;
  if(!sys||!alts||!alts.length)return <Setup token={session.access_token} userId={session.user.id} onDone={function(s,a){setSys(s);setAlts(a)}}/>;
  return <Main session={session} system={sys} alters={alts} onLogout={function(){LS.d("plural_session");setSession(null);setSys(null);setAlts(null)}} onRefresh={tryRefresh}/>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

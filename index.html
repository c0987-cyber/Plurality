var C={bg:"#0a0b10",s1:"#111219",s2:"#16171f",s3:"#1c1d2a",s4:"#232536",bd:"#252842",bd2:"#353860",tx:"#e4e6f0",t2:"#8890a8",t3:"#4d5268",ac:"#b4a5ff",ok:"#6bffa2",wn:"#ffd66b",er:"#ff6b8a",side:"#0e0f16"};

// ===== AUTH =====
function Auth({onAuth}){
  var _m=useState("login"),m=_m[0],setM=_m[1];var _e=useState(""),email=_e[0],setEmail=_e[1];var _p=useState(""),pw=_p[0],setPw=_p[1];var _l=useState(false),ld=_l[0],setLd=_l[1];var _er=useState(""),err=_er[0],setErr=_er[1];
  var go=async function(){if(!email||!pw)return setErr("Fill in both fields");if(pw.length<6)return setErr("6+ chars needed");setLd(true);setErr("");try{if(m==="signup"){var d=await D.signup(email,pw);if(d.access_token)onAuth(d);else{setM("login");setErr("Check email, then log in!");}}else onAuth(await D.login(email,pw));}catch(e){setErr(e.message);}setLd(false);};
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"radial-gradient(ellipse at 50% 0%,#1a1040 0%,"+C.bg+" 70%)"}}>
    <div className="fi" style={{width:"100%",maxWidth:340}}>
      <div style={{textAlign:"center",marginBottom:40}}><div style={{fontSize:56,marginBottom:8}}>🌀</div><h1 style={{fontSize:32,fontWeight:800,letterSpacing:"-1px"}}>Plural</h1><p style={{color:C.t2,fontSize:14,marginTop:6}}>A space for every part of you</p></div>
      <div style={{display:"flex",gap:4,marginBottom:20,background:C.s2,borderRadius:10,padding:3}}>{["login","signup"].map(function(x){return <button key={x} onClick={function(){setM(x);setErr("");}} style={Object.assign({},BT,{flex:1,padding:"9px 0",background:m===x?C.s4:"transparent",color:m===x?C.tx:C.t3,borderRadius:8,fontSize:13})}>{x==="login"?"Log In":"Sign Up"}</button>;})}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <input type="email" placeholder="Email" value={email} onChange={function(e){setEmail(e.target.value);}} style={IS} onKeyDown={function(e){if(e.key==="Enter")go();}}/>
        <input type="password" placeholder="Password" value={pw} onChange={function(e){setPw(e.target.value);}} style={IS} onKeyDown={function(e){if(e.key==="Enter")go();}}/>
        {err&&<p style={{color:err.indexOf("confirm")>-1?C.wn:C.er,fontSize:12,textAlign:"center"}}>{err}</p>}

      </div>

}

// ===== SETUP =====
function Setup({token,userId,onDone}){
  var _st=useState(1),step=_st[0],setStep=_st[1];var _sn=useState(""),sn=_sn[0],setSn=_sn[1];var _an=useState(""),an=_an[0],setAn=_an[1];var _ap=useState(""),ap=_ap[0],setAp=_ap[1];var _ac=useState(COLS[5]),ac=_ac[0],setAc=_ac[1];var _ae=useState("🌀"),ae=_ae[0],setAe=_ae[1];var _ld=useState(false),ld=_ld[0],setLd=_ld[1];
  var finish=async function(){if(!sn.trim()||!an.trim())return;setLd(true);try{var r1=await D.post("systems",{user_id:userId,display_name:sn.trim(),system_code:gc()},token);var r2=await D.post("alters",{system_id:r1[0].id,name:an.trim(),pronouns:ap.trim(),color:ac,avatar_emoji:ae},token);onDone(r1[0],[r2[0]]);}catch(e){try{var r3=await D.post("systems",{user_id:userId,display_name:sn.trim(),system_code:gc()},token);var r4=await D.post("alters",{system_id:r3[0].id,name:an.trim(),pronouns:ap.trim(),color:ac,avatar_emoji:ae},token);onDone(r3[0],[r4[0]]);}catch(e2){alert(e2.message);}}setLd(false);};
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

      <div style={{textAlign:"center",marginBottom:28}}><div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>{[1,2].map(function(i){return <div key={i} style={{width:40,height:4,borderRadius:2,background:step>=i?C.ac:C.bd}}/>;})}</div><h2 style={{fontSize:22,fontWeight:600}}>{step===1?"Name your system":"Create your first alter"}</h2></div>

        <div><p style={{fontSize:12,color:C.t2,marginBottom:6}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap",maxHeight:120,overflowY:"auto"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setAe(em);}} style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer",background:ae===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>

// ===== MAIN =====
function Main({session,system:initSys,alters:initAlts,onLogout}){
  var tk=session.access_token;
  var _sys=useState(initSys),sys=_sys[0];
  var _alters=useState(initAlts),alters=_alters[0],setAlters=_alters[1];
  var _active=useState(initAlts[0]),active=_active[0],setActive=_active[1];
  var _conns=useState([]),conns=_conns[0],setConns=_conns[1];
  var _ca=useState({}),connAlts=_ca[0],setConnAlts=_ca[1];
  var _pending=useState([]),pending=_pending[0],setPending=_pending[1];
  var _groups=useState([]),groups=_groups[0],setGroups=_groups[1];
  var _gm=useState({}),groupMembers=_gm[0],setGroupMembers=_gm[1];
  var _drawer=useState(false),drawer=_drawer[0],setDrawer=_drawer[1];
  var _view=useState("home"),view=_view[0],setView=_view[1]; // home|chat|groupChat|addContact|addAlter|addGroup|frontLog|profile
  var _ct=useState(null),chatTarget=_ct[0],setChatTarget=_ct[1];
  var _ag=useState(null),activeGroup=_ag[0],setActiveGroup=_ag[1];
  var _msgs=useState([]),msgs=_msgs[0],setMsgs=_msgs[1];
  var _mi=useState(""),msgIn=_mi[0],setMsgIn=_mi[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _toast=useState(null),toast=_toast[0],setToast=_toast[1];
  var _sc=useState(""),searchCode=_sc[0],setSearchCode=_sc[1];
  var _sr=useState(null),searchRes=_sr[0],setSearchRes=_sr[1];
  var _sl=useState(false),searchLd=_sl[0],setSearchLd=_sl[1];
  var _na=useState({name:"",pronouns:"",color:COLS[0],avatar_emoji:"⭐"}),newAlt=_na[0],setNewAlt=_na[1];
  var _ed=useState(null),editing=_ed[0],setEditing=_ed[1];
  var _ng=useState({name:"",emoji:"🌐",color:COLS[4],members:[]}),newGroup=_ng[0],setNewGroup=_ng[1];
  var _lastMsgs=useState({}),lastMsgs=_lastMsgs[0],setLastMsgs=_lastMsgs[1];
  var _frontLog=useState([]),frontLog=_frontLog[0],setFrontLog=_frontLog[1];
  var _moodPick=useState(null),moodPick=_moodPick[0],setMoodPick=_moodPick[1];
  var endRef=useRef(null);var pollRef=useRef(null);

  // Load connections
  var loadConns=useCallback(async function(){try{
    var ac2=await D.get("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);
    var pd=await D.get("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);
    var allIds=ac2.flatMap(function(c){return[c.requester_id,c.receiver_id];}).concat(pd.map(function(p){return p.requester_id;}));
    var ids=allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i;});
    if(ids.length>0){
      var ss=await D.get("systems","id=in.("+ids.join(",")+")",tk);
      var aa=await D.get("alters","system_id=in.("+ids.join(",")+")",tk);
      var am={};aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a);});
      setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o;})});}).filter(function(c){return c.otherSystem;}));
      setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id;})});}).filter(function(p){return p.otherSystem;}));
      setConnAlts(am);
    }else{setConns([]);setPending(pd);}
  }catch(e){console.error(e);}},[sys.id,tk]);

  var loadGroups=useCallback(async function(){try{
    var mg=await D.get("group_members","system_id=eq."+sys.id+"&select=group_id",tk);
    if(mg.length>0){var gids=mg.map(function(g){return g.group_id;});var gs=await D.get("groups","id=in.("+gids.join(",")+")",tk);setGroups(gs);
      var mb=await D.get("group_members","group_id=in.("+gids.join(",")+")",tk);var mm={};mb.forEach(function(m){if(!mm[m.group_id])mm[m.group_id]=[];mm[m.group_id].push(m);});setGroupMembers(mm);
    }else setGroups([]);
  }catch(e){console.error(e);}},[sys.id,tk]);

  useEffect(function(){loadConns();loadGroups();},[loadConns,loadGroups]);

  // Poll for new friend requests every 10s
  useEffect(function(){var iv=setInterval(loadConns,10000);return function(){clearInterval(iv);};},[loadConns]);

  // Load last messages
  useEffect(function(){
    if(!conns.length||!alters.length)return;
    var loadLast=async function(){var lm={};var myIds=alters.map(function(a){return a.id;});
      for(var i=0;i<conns.length;i++){var s=conns[i].otherSystem;var sa=connAlts[s.id]||[];if(!sa.length)continue;var tIds=sa.map(function(a){return a.id;});
        try{var r=await D.get("messages","or=(and(sender_alter_id.in.("+myIds.join(",")+"),receiver_alter_id.in.("+tIds.join(",")+")),and(sender_alter_id.in.("+tIds.join(",")+"),receiver_alter_id.in.("+myIds.join(",")+")))"+"&order=created_at.desc&limit=1",tk);if(r.length)lm[s.id]=r[0];}catch(e){}}
      setLastMsgs(lm);};
    loadLast();var iv=setInterval(loadLast,8000);return function(){clearInterval(iv);};
  },[conns,connAlts,alters,tk]);

  // Poll chat
  useEffect(function(){
    if(view!=="chat"||!chatTarget||!active)return;
    var load=async function(){try{var my=active.id,th=chatTarget.alter.id;setMsgs(await D.get("messages","or=(and(sender_alter_id.eq."+my+",receiver_alter_id.eq."+th+"),and(sender_alter_id.eq."+th+",receiver_alter_id.eq."+my+"))&order=created_at.asc",tk));}catch(e){}};

  },[view,activeGroup&&activeGroup.id,tk]);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  // Fronting log
  var logFront=useCallback(async function(alterId){
    try{
      // End current fronts
      var current=await D.get("fronting_log","system_id=eq."+sys.id+"&ended_at=is.null",tk);
      for(var i=0;i<current.length;i++){await D.patch("fronting_log","id=eq."+current[i].id,{ended_at:new Date().toISOString()},tk);}

  },[sys.id,tk]);

  var switchAlter=function(a){setActive(a);logFront(a.id);};

  // Set mood
  var setMood=async function(alterId,mood){

  var createGroup=async function(){if(!newGroup.name.trim())return;try{var r=await D.post("groups",{name:newGroup.name.trim(),emoji:newGroup.emoji,color:newGroup.color,created_by:sys.id},tk);await D.post("group_members",{group_id:r[0].id,system_id:sys.id},tk);for(var i=0;i<newGroup.members.length;i++){await D.post("group_members",{group_id:r[0].id,system_id:newGroup.members[i]},tk);}setNewGroup({name:"",emoji:"🌐",color:COLS[4],members:[]});setView("home");loadGroups();setToast({msg:"Group created!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};
  var openDM=function(alt,s){setChatTarget({alter:alt,system:s});setMsgs([]);setView("chat");setDrawer(false);};

  var sortedConns=useMemo(function(){return conns.slice().sort(function(a,b){var la=lastMsgs[a.otherSystem.id];var lb=lastMsgs[b.otherSystem.id];if(!la&&!lb)return 0;if(!la)return 1;if(!lb)return-1;return new Date(lb.created_at)-new Date(la.created_at);});},[conns,lastMsgs]);

            </div>

                    <button className="hov" onClick={function(){acceptReq(p.id);}} style={Object.assign({},BT,{padding:"5px 12px",background:C.ok,color:"#0a0b10",fontSize:12})}>Accept</button>

              <button className="hov" onClick={searchSys} disabled={searchLd} style={Object.assign({},BT,{padding:"11px 16px",background:C.ac,color:"#0a0b10"})}>{searchLd?<Spin sz={14}/>:"🔍"}</button>
            </div>
            {searchRes&&<div className="fi" style={{background:C.s2,borderRadius:14,padding:14}}>
              {searchRes.none?<p style={{color:C.t3,textAlign:"center"}}>No system found</p>
              :searchRes.self?<p style={{color:C.t3,textAlign:"center"}}>That's you!</p>
              :<div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div><h3 style={{fontSize:15,fontWeight:600}}>{searchRes.sys.display_name}</h3><p style={{fontSize:11,color:C.t3}}>{searchRes.alts.length} alters</p></div>
                  <button className="hov" onClick={function(){sendReq(searchRes.sys.id);}} style={Object.assign({},BT,{fontSize:12,padding:"7px 14px",background:C.ac,color:"#0a0b10"})}>Add</button>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{searchRes.alts.map(function(a){return <div key={a.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px 3px 3px",background:C.s3,borderRadius:14}}><Badge a={a} sz={18}/><span style={{fontSize:11}}>{a.name}</span></div>;})}</div>
              </div>}
            </div>}
          </div>}

          {/* ADD ALTER */}
          {view==="addAlter"&&<div className="fi" style={{padding:14}}>
            <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>New Alter</h2>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="Name" value={newAlt.name} onChange={function(e){setNewAlt(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <input placeholder="Pronouns" value={newAlt.pronouns} onChange={function(e){setNewAlt(function(p){return Object.assign({},p,{pronouns:e.target.value});});}} style={IS}/>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{color:c});});}} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:newAlt.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap",maxHeight:140,overflowY:"auto"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{avatar_emoji:em});});}} style={{width:30,height:30,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer",background:newAlt.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
              <button className="hov" onClick={addAlterFn} disabled={!newAlt.name.trim()} style={Object.assign({},BT,{marginTop:6,background:C.ac,color:"#0a0b10",opacity:newAlt.name.trim()?1:0.4})}>Add Alter</button>
            </div>
          </div>}

          {/* ADD GROUP */}
          {view==="addGroup"&&<div className="fi" style={{padding:14}}>
            <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>New Group</h2>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="Group name" value={newGroup.name} onChange={function(e){setNewGroup(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{GEMO.map(function(em){return <div key={em} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{emoji:em});});}} style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer",background:newGroup.emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{color:c});});}} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:newGroup.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              {conns.length>0&&<div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Add systems</p>{conns.map(function(c){var s=c.otherSystem;var sel=newGroup.members.indexOf(s.id)>-1;return <div key={s.id} className="hov" onClick={function(){setNewGroup(function(p){return Object.assign({},p,{members:sel?p.members.filter(function(x){return x!==s.id;}):p.members.concat([s.id])});});}} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:sel?C.ac+"15":"transparent"}}><div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(sel?C.ac:C.bd),background:sel?C.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#0a0b10",fontSize:10,fontWeight:900}}>✓</span>}</div><span style={{fontWeight:500,fontSize:13}}>{s.display_name}</span></div>;})}</div>}
              <button className="hov" onClick={createGroup} disabled={!newGroup.name.trim()} style={Object.assign({},BT,{marginTop:6,background:C.ac,color:"#0a0b10",opacity:newGroup.name.trim()?1:0.4})}>Create Group</button>
            </div>
          </div>}

          {/* FRONTING LOG */}
          {view==="frontLog"&&<div className="fi" style={{padding:14}}>
            <h2 style={{fontSize:18,fontWeight:600,marginBottom:4}}>Fronting Log</h2>
            <p style={{fontSize:12,color:C.t3,marginBottom:16}}>Track who's been fronting and when</p>
            {frontLog.length===0?<p style={{color:C.t3,textAlign:"center",padding:20}}>No fronting history yet. Switch alters to start tracking!</p>
            :frontLog.map(function(f){
              var alt=allAlters[f.alter_id]||{name:"?",color:"#888",avatar_emoji:"❓",mood:""};
              var start=new Date(f.started_at);
              var end=f.ended_at?new Date(f.ended_at):null;
              var dur=end?Math.round((end-start)/60000):Math.round((Date.now()-start)/60000);
              var durStr=dur<60?dur+"m":Math.floor(dur/60)+"h "+dur%60+"m";
              return <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.s2,borderRadius:10,marginBottom:4,borderLeft:"3px solid "+alt.color}}>
                <Badge a={alt} sz={30}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{alt.name}</div>
                  <div style={{fontSize:11,color:C.t3}}>{start.toLocaleDateString()+" "+start.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,color:end?C.t2:C.ok,fontWeight:600}}>{end?"":"⚡ Now"}</div>
                  <div style={{fontSize:11,color:C.t3}}>{durStr}</div>
                </div>
              </div>;
            })}
          </div>}

          {/* PROFILE */}
          {view==="profile"&&<div className="fi" style={{padding:14}}>
            <div style={{background:"linear-gradient(135deg,"+C.ac+"15,"+C.s2+")",borderRadius:14,padding:20,marginBottom:14,border:"1px solid "+C.bd}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:C.ac+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{alters[0].avatar_emoji}</div>
                <div><h2 style={{fontSize:18,fontWeight:700}}>{sys.display_name}</h2><p style={{fontSize:12,color:C.t2}}>{alters.length} alter{alters.length!==1?"s":""} · {conns.length} connection{conns.length!==1?"s":""}</p></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,background:C.s1,borderRadius:8,padding:"8px 12px"}}>
                <span style={{fontSize:10,color:C.t3,fontWeight:600}}>CODE</span>
                <span style={{fontWeight:700,letterSpacing:3,color:C.ac,fontSize:16,flex:1}}>{sys.system_code}</span>
                <button className="hov" onClick={copyCode} style={Object.assign({},BT,{padding:4,background:"transparent",border:"none",color:C.t2})}>📋</button>
              </div>
            </div>
            <p style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8,fontWeight:700}}>Alters</p>
            {alters.map(function(a){return <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.s2,borderRadius:10,marginBottom:4,border:active.id===a.id?"1px solid "+a.color+"44":"1px solid transparent"}}>
              <Badge a={a} sz={36} on={active.id===a.id}/>
              <div style={{flex:1}}><span style={{fontWeight:600,fontSize:14}}>{a.name}</span>{a.pronouns&&<span style={{fontSize:11,color:C.t3,marginLeft:5}}>{a.pronouns}</span>}{a.mood&&<span style={{marginLeft:4}}>{a.mood}</span>}</div>
              <button className="hov" onClick={function(){setEditing(Object.assign({},a));}} style={Object.assign({},BT,{padding:5,background:"transparent",border:"none",color:C.t2})}>✏️</button>
              {alters.length>1&&<button className="hov" onClick={function(){if(confirm("Remove "+a.name+"?"))delAlter(a.id);}} style={Object.assign({},BT,{padding:5,background:"transparent",border:"none",color:C.er})}>🗑️</button>}
            </div>;})}
            <button className="hov" onClick={onLogout} style={Object.assign({},BT,{width:"100%",marginTop:20,background:"transparent",color:C.er,border:"1px solid "+C.er+"33"})}>Log Out</button>
          </div>}
        </div>

        {/* MSG INPUT */}
        {inChat&&<div style={{padding:"8px 12px",background:C.s1,borderTop:"1px solid "+C.bd,display:"flex",gap:6,flexShrink:0}}>
          <input value={msgIn} onChange={function(e){setMsgIn(e.target.value);}} placeholder={"Message as "+active.name+"..."}
            style={Object.assign({},IS,{flex:1,borderColor:active.color+"30",padding:"10px 14px",borderRadius:20,background:C.s2})}
            onFocus={function(e){e.target.style.borderColor=active.color;}} onBlur={function(e){e.target.style.borderColor=active.color+"30";}}
            onKeyDown={function(e){if(e.key==="Enter"){view==="chat"?sendDM():sendGM();}}}/>
          <button className="hov" onClick={view==="chat"?sendDM:sendGM} disabled={!msgIn.trim()||sending}
            style={Object.assign({},BT,{padding:"10px 14px",background:active.color,color:"#0a0b10",borderRadius:20,opacity:msgIn.trim()&&!sending?1:0.3})}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>}
      </div>

      {/* EDIT MODAL */}
      {editing&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={function(){setEditing(null);}}>
        <div className="pop" onClick={function(e){e.stopPropagation();}} style={{background:C.s1,borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:400,border:"1px solid "+C.bd,borderBottom:"none",maxHeight:"80vh",overflow:"auto"}}>
          <div style={{width:36,height:4,borderRadius:2,background:C.bd,margin:"0 auto 16px"}}/>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:14}}>Edit {editing.name}</h3>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input value={editing.name} onChange={function(e){setEditing(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
            <input value={editing.pronouns||""} onChange={function(e){setEditing(function(p){return Object.assign({},p,{pronouns:e.target.value});});}} placeholder="Pronouns" style={IS}/>
            <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setEditing(function(p){return Object.assign({},p,{color:c});});}} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",border:editing.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
            <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:3,flexWrap:"wrap",maxHeight:100,overflowY:"auto"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setEditing(function(p){return Object.assign({},p,{avatar_emoji:em});});}} style={{width:28,height:28,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",background:editing.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
            <div style={{display:"flex",gap:7,marginTop:8}}>
              <button className="hov" onClick={function(){setEditing(null);}} style={Object.assign({},BT,{flex:1,background:"transparent",color:C.t2,border:"1px solid "+C.bd})}>Cancel</button>
              <button className="hov" onClick={saveEdit} style={Object.assign({},BT,{flex:1,background:C.ac,color:"#0a0b10"})}>Save</button>
            </div>
          </div>
        </div>
      </div>}

      {/* MOOD PICKER */}
      {moodPick&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={function(){setMoodPick(null);}}>
        <div className="pop" onClick={function(e){e.stopPropagation();}} style={{background:C.s1,borderRadius:16,padding:20,width:"100%",maxWidth:320,border:"1px solid "+C.bd}}>
          <h3 style={{fontSize:16,fontWeight:600,marginBottom:4}}>Set mood for {moodPick.name}</h3>
          <p style={{fontSize:12,color:C.t3,marginBottom:12}}>Others will see this on your avatar</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {MOODS.map(function(m,i){return <div key={i} onClick={function(){setMood(moodPick.id,m);}} style={{width:40,height:40,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:moodPick.mood===m?C.s4:"transparent",border:moodPick.mood===m?"1px solid "+C.bd2:"1px solid transparent"}}>{m||"❌"}</div>;})}
          </div>
        </div>
      </div>}
    </div>
  );
}

function App(){
  var _s=useState(null),session=_s[0],setSession=_s[1];var _sys=useState(null),sys=_sys[0],setSys=_sys[1];var _alts=useState(null),alts=_alts[0],setAlts=_alts[1];var _ld=useState(true),loading=_ld[0],setLoading=_ld[1];
  useEffect(function(){var saved=LS.get("plural_session");if(saved){(async function(){try{var s=await D.get("systems","user_id=eq."+saved.user.id,saved.access_token);if(s.length>0){var a=await D.get("alters","system_id=eq."+s[0].id+"&order=created_at.asc",saved.access_token);setSession(saved);setSys(s[0]);setAlts(a);}else setSession(saved);}catch(e){LS.del("plural_session");}setLoading(false);})();}else setLoading(false);},[]);
  var handleAuth=useCallback(async function(d){setSession(d);LS.set("plural_session",d);try{var s=await D.get("systems","user_id=eq."+d.user.id,d.access_token);if(s.length>0){setSys(s[0]);var a=await D.get("alters","system_id=eq."+s[0].id+"&order=created_at.asc",d.access_token);setAlts(a);}}catch(e){}setLoading(false);},[]);
  if(loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><Spin sz={28}/></div>;
  if(!session) return <Auth onAuth={handleAuth}/>;
  if(!sys||!alts||!alts.length) return <Setup token={session.access_token} userId={session.user.id} onDone={function(s,a){setSys(s);setAlts(a);}}/>;
  return <Main session={session} system={sys} alters={alts} onLogout={function(){LS.del("plural_session");setSession(null);setSys(null);setAlts(null);}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

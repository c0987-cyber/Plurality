var notifOk=false;
function initNotifs(){
  if(!("Notification"in window))return;
  if(Notification.permission==="granted"){notifOk=true;return}
  if(Notification.permission!=="denied"){
    Notification.requestPermission().then(function(p){notifOk=p==="granted"})
  }
}
// notify with optional nav data — clicking will switch alter + open that chat
function notify(title,body,data){
  if(!notifOk)return;
  try{
    var tag="plr"+(data?"-"+data.myAlterId+"_"+data.theirAlterId:"");
    var n=new Notification(title,{body:body,tag:tag,silent:false});
    if(data){
      n.onclick=function(){
        window.focus();
        window.dispatchEvent(new CustomEvent("plurality-nav",{detail:data}));
        n.close();
      }
    }
  }catch(e){}
}

// Data
var loadConns=useCallback(async function(){try{var ac2=await D.g("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);var pd=await D.g("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);var allIds=ac2.flatMap(function(c){return[c.requester_id,c.receiver_id]}).concat(pd.map(function(p){return p.requester_id}));var ids=allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i});if(ids.length>0){var ss=await D.g("systems","id=in.("+ids.join(",")+")",tk);var aa=await D.g("alters","system_id=in.("+ids.join(",")+")",tk);var am={};aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a)});setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o})})}).filter(function(c){return c.otherSystem}));setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id})})}).filter(function(p){return p.otherSystem}));setConnAlts(am)}else{setConns([]);setPending(pd)}}catch(e){if(e.message==="AUTH"&&onRefresh)onRefresh()}},[sys.id,tk]);

// ── GLOBAL BACKGROUND NOTIFICATION POLLER ──
// Polls ALL incoming messages for ALL alters, fires notifications for any that are new.
// Runs always, skips the currently open chat pair (already visible).
useEffect(function(){
  if(!alters.length)return;
  var myIds=alters.map(function(a){return a.id});

  var poll=async function(){
    // Flatten all connection alters
    var allConnAlts=[];
    Object.values(connAlts).forEach(function(arr){allConnAlts=allConnAlts.concat(arr)});
    var theirIds=allConnAlts.map(function(a){return a.id});
    if(!theirIds.length)return;

    try{
      // Only query messages sent TO my alters FROM connected alters
      var msgs=await D.g("messages",
        "sender_alter_id=in.("+theirIds.join(",")+")" +
        "&receiver_alter_id=in.("+myIds.join(",")+")" +
        "&order=created_at.desc&limit=80",
        tk
      );

      // Group by conversation pair, keep only the latest per pair
      var byPair={};
      msgs.forEach(function(m){
        var key=m.sender_alter_id+"_"+m.receiver_alter_id;
        if(!byPair[key])byPair[key]=m;
      });

      Object.keys(byPair).forEach(function(key){
        var m=byPair[key];
        var ct=chatTargetRef.current;

        // Skip the currently open chat — user can already see it
        if(ct&&ct.myAlter.id===m.receiver_alter_id&&ct.theirAlter.id===m.sender_alter_id)return;

        var seen=lastSeenRef.current[key];

        if(!seen){
          // First time seeing this pair — initialize silently
          lastSeenRef.current[key]=m.id;
          LS.s("plural_last_seen",lastSeenRef.current);
          return;
        }

        if(seen===m.id)return; // Already notified for this message

        // New incoming message! Find the alters to build the notification.
        var myAlt=alters.find(function(a){return a.id===m.receiver_alter_id});
        var theirAlt=allConnAlts.find(function(a){return a.id===m.sender_alter_id});
        var targetSysId=null;
        Object.entries(connAlts).forEach(function(entry){
          if(entry[1].find(function(a){return a.id===m.sender_alter_id}))targetSysId=entry[0];
        });

        if(myAlt&&theirAlt&&targetSysId){
          var body=isImg(m.content)?"Sent a photo":m.content.substring(0,90);
          var navData={myAlterId:myAlt.id,theirAlterId:theirAlt.id,systemId:targetSysId};
          notify(theirAlt.name+" → "+myAlt.name,body,navData);
        }

        // Mark as seen regardless
        lastSeenRef.current[key]=m.id;
        LS.s("plural_last_seen",lastSeenRef.current);
      });
    }catch(e){}
  };

  poll();
  var iv=setInterval(poll,4000);
  return function(){clearInterval(iv)};
},[alters,connAlts,tk]);

useEffect(function(){var saved=LS.g("plural_session");if(saved){(async function(){try{var s=await D.g("systems","user_id=eq."+saved.user.id,saved.access_token);if(s.length>0){var a=await D.g("alters","system_id=eq."+s[0].id+"&order=created_at.asc",saved.access_token);setSession(saved);setSys(s[0]);setAlts(a)}else setSession(saved)}catch(e){if(saved.refresh_token){try{var d=await D.refresh(saved.refresh_token);var ns={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};LS.s("plural_session",ns);var s2=await D.g("systems","user_id=eq."+ns.user.id,ns.access_token);if(s2.length>0){var a2=await D.g("alters","system_id=eq."+s2[0].id+"&order=created_at.asc",ns.access_token);setSession(ns);setSys(s2[0]);setAlts(a2)}else setSession(ns)}catch(e2){LS.d("plural_session")}}else LS.d("plural_session")}setLoading(false)})()}else setLoading(false)},[]);
var handleAuth=useCallback(async function(d){var sess={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};setSession(sess);LS.s("plural_session",sess);try{var s=await D.g("systems","user_id=eq."+d.user.id,d.access_token);if(s.length>0){setSys(s[0]);var a=await D.g("alters","system_id=eq."+s[0].id+"&order=created_at.asc",d.access_token);setAlts(a)}}catch(e){}setLoading(false)},[]);
if(loading)return <div style={{height:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><Spin sz={28}/></div>;
if(!session)return <Auth onAuth={handleAuth}/>;
if(!sys||!alts||!alts.length)return <Setup token={session.access_token} userId={session.user.id} onDone={function(s,a){setSys(s);setAlts(a)}}/>;
return <Main session={session} system={sys} alters={alts} onLogout={function(){LS.d("plural_session");setSession(null);setSys(null);setAlts(null)}} onRefresh={tryRefresh}/>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

function Main({session,system:initSys,alters:initAlts,onLogout,onRefresh}){
  var tk=session.access_token;
  var _sys=useState(initSys),sys=_sys[0];
  var _alters=useState(initAlts),alters=_alters[0],setAlters=_alters[1];
  var _active=useState(initAlts[0]),active=_active[0],setActive=_active[1];
  var _conns=useState([]),conns=_conns[0],setConns=_conns[1];
  var _ca=useState({}),connAlts=_ca[0],setConnAlts=_ca[1];
  var _pending=useState([]),pending=_pending[0],setPending=_pending[1];
  var _groups=useState([]),groups=_groups[0],setGroups=_groups[1];
  var _gm=useState({}),groupMembers=_gm[0],setGroupMembers=_gm[1];
  var _drawer=useState(false),drawer=_drawer[0],setDrawer=_drawer[1];
  var _drawerExp=useState({}),drawerExp=_drawerExp[0],setDrawerExp=_drawerExp[1]; // expanded connections in drawer
  var _view=useState("home"),view=_view[0],setView=_view[1];
  // Chat target: {system, myAlter, theirAlter}
  var _ct=useState(null),chatTarget=_ct[0],setChatTarget=_ct[1];
  var _ag=useState(null),activeGroup=_ag[0],setActiveGroup=_ag[1];
  var _msgs=useState([]),msgs=_msgs[0],setMsgs=_msgs[1];
  var _mi=useState(""),msgIn=_mi[0],setMsgIn=_mi[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _toast=useState(null),toast=_toast[0],setToast=_toast[1];
  var _sc=useState(""),searchCode=_sc[0],setSearchCode=_sc[1];
  var _sr=useState(null),searchRes=_sr[0],setSearchRes=_sr[1];
  var _sl=useState(false),searchLd=_sl[0],setSearchLd=_sl[1];
  var _na=useState({name:"",pronouns:"",color:COLS[0],avatar_emoji:"⭐"}),newAlt=_na[0],setNewAlt=_na[1];
  var _ed=useState(null),editing=_ed[0],setEditing=_ed[1];
  var _ng=useState({name:"",emoji:"🌐",color:COLS[4],members:[]}),newGroup=_ng[0],setNewGroup=_ng[1];
  var _lastMsgs=useState({}),lastMsgs=_lastMsgs[0],setLastMsgs=_lastMsgs[1];
  var _chatTabOpen=useState(false),chatTabOpen=_chatTabOpen[0],setChatTabOpen=_chatTabOpen[1]; // expanded conversation selector in chat
  var endRef=useRef(null);var pollRef=useRef(null);

  var inChat=view==="chat"||view==="groupChat";

  // Swipe: right opens drawer or exits chat, left closes drawer
  var swipe=useSwipe(
    function(){if(inChat){setView("home");clearInterval(pollRef.current)}else if(!drawer)setDrawer(true)}, // swipe right
    function(){if(drawer)setDrawer(false)} // swipe left
  );

  // ---- DATA LOADING ----
  var loadConns=useCallback(async function(){try{
    var ac2=await A.g("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);
    var pd=await A.g("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);
    var allIds=ac2.flatMap(function(c){return[c.requester_id,c.receiver_id]}).concat(pd.map(function(p){return p.requester_id}));
    var ids=allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i});
    if(ids.length>0){
      var ss=await A.g("systems","id=in.("+ids.join(",")+")",tk);var aa=await A.g("alters","system_id=in.("+ids.join(",")+")",tk);
      var am={};aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a)});
      setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o})})}).filter(function(c){return c.otherSystem}));
      setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id})})}).filter(function(p){return p.otherSystem}));
      setConnAlts(am);
    }else{setConns([]);setPending(pd)}
  }catch(e){if(e.message==="AUTH"&&onRefresh)onRefresh()}},[sys.id,tk]);

  var loadGroups=useCallback(async function(){try{var mg=await A.g("group_members","system_id=eq."+sys.id+"&select=group_id",tk);if(mg.length>0){var gids=mg.map(function(g){return g.group_id});var gs=await A.g("groups","id=in.("+gids.join(",")+")",tk);setGroups(gs);var mb=await A.g("group_members","group_id=in.("+gids.join(",")+")",tk);var mm={};mb.forEach(function(m){if(!mm[m.group_id])mm[m.group_id]=[];mm[m.group_id].push(m)});setGroupMembers(mm)}else setGroups([])}catch(e){}},[sys.id,tk]);

  useEffect(function(){loadConns();loadGroups()},[loadConns,loadGroups]);
  useEffect(function(){var iv=setInterval(loadConns,10000);return function(){clearInterval(iv)}},[loadConns]);

  // Last messages PER ACTIVE ALTER
  useEffect(function(){
    if(!conns.length||!active)return;
    var loadLast=async function(){var lm={};var myId=active.id;
      for(var i=0;i<conns.length;i++){var s=conns[i].otherSystem;var sa=connAlts[s.id]||[];if(!sa.length)continue;var tIds=sa.map(function(a){return a.id});
        try{var r=await A.g("messages","or=(and(sender_alter_id.eq."+myId+",receiver_alter_id.in.("+tIds.join(",")+")),and(sender_alter_id.in.("+tIds.join(",")+"),receiver_alter_id.eq."+myId+"))"+"&order=created_at.desc&limit=1",tk);if(r.length)lm[s.id]=r[0]}catch(e){}}
      setLastMsgs(lm)};
    loadLast();var iv=setInterval(loadLast,8000);return function(){clearInterval(iv)}
  },[conns,connAlts,active,tk]);

  // Poll chat messages
  useEffect(function(){
    if(view!=="chat"||!chatTarget)return;
    var load=async function(){try{var my=chatTarget.myAlter.id,th=chatTarget.theirAlter.id;setMsgs(await A.g("messages","or=(and(sender_alter_id.eq."+my+",receiver_alter_id.eq."+th+"),and(sender_alter_id.eq."+th+",receiver_alter_id.eq."+my+"))&order=created_at.asc",tk))}catch(e){}};
    load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current)}
  },[view,chatTarget&&chatTarget.myAlter.id,chatTarget&&chatTarget.theirAlter.id,tk]);

  useEffect(function(){
    if(view!=="groupChat"||!activeGroup)return;
    var load=async function(){try{setMsgs(await A.g("group_messages","group_id=eq."+activeGroup.id+"&order=created_at.asc",tk))}catch(e){}};
    load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current)}
  },[view,activeGroup&&activeGroup.id,tk]);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"})},[msgs]);

  // ---- ACTIONS ----
  var switchAlter=function(a){setActive(a)};

  // Open a specific DM conversation (myAlter + theirAlter)
  var openDM=function(myAlt,theirAlt,otherSys){
    setChatTarget({system:otherSys,myAlter:myAlt,theirAlter:theirAlt});
    setActive(myAlt); // auto-switch to that alter
    setMsgs([]);setView("chat");setDrawer(false);setChatTabOpen(false);
  };

  // Open DM with default (active alter + their first alter)
  var openDMDefault=function(otherSys){
    var sa=connAlts[otherSys.id]||[];
    if(!sa.length)return;
    openDM(active,sa[0],otherSys);
  };

  // Switch conversation within chat (changes alter pair)
  var switchConvo=function(myAlt,theirAlt){
    setChatTarget(function(prev){return{system:prev.system,myAlter:myAlt,theirAlter:theirAlt}});
    setActive(myAlt);
    setMsgs([]);setChatTabOpen(false);
  };

  var openGrp=function(g){setActiveGroup(g);setMsgs([]);setView("groupChat");setDrawer(false)};

  var sendDM=async function(){if(!msgIn.trim()||!chatTarget||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await A.p("messages",{sender_alter_id:chatTarget.myAlter.id,receiver_alter_id:chatTarget.theirAlter.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]])})}catch(e){setToast({msg:"Send failed",type:"error"})}setSending(false)};
  var sendGM=async function(){if(!msgIn.trim()||!activeGroup||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await A.p("group_messages",{group_id:activeGroup.id,sender_alter_id:active.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]])})}catch(e){setToast({msg:"Send failed",type:"error"})}setSending(false)};
  var deleteMsg=async function(id){try{await A.dl("messages","id=eq."+id,tk);setMsgs(function(p){return p.filter(function(m){return m.id!==id})})}catch(e){}};
  var searchSys=async function(){if(!searchCode.trim())return;setSearchLd(true);setSearchRes(null);try{var r=await A.g("systems","system_code=eq."+searchCode.trim().toUpperCase(),tk);if(!r.length)setSearchRes({none:true});else if(r[0].id===sys.id)setSearchRes({self:true});else{var a=await A.g("alters","system_id=eq."+r[0].id,tk);setSearchRes({sys:r[0],alts:a})}}catch(e){}setSearchLd(false)};
  var sendReq=async function(id){try{await A.p("connections",{requester_id:sys.id,receiver_id:id},tk);setToast({msg:"Request sent!",type:"success"});setSearchRes(null);setSearchCode("");loadConns()}catch(e){setToast({msg:"Already connected",type:"error"})}};
  var acceptReq=async function(id){try{await A.pa("connections","id=eq."+id,{status:"accepted"},tk);setToast({msg:"Connected!",type:"success"});loadConns()}catch(e){}};
  var rejectReq=async function(id){try{await A.dl("connections","id=eq."+id,tk);loadConns()}catch(e){}};
  var unfriend=async function(connId,name){if(!confirm("Unfriend "+name+"?"))return;try{await A.dl("connections","id=eq."+connId,tk);setToast({msg:"Unfriended",type:"success"});loadConns()}catch(e){}};
  var addAlterFn=async function(){if(!newAlt.name.trim())return;try{var r=await A.p("alters",{system_id:sys.id,name:newAlt.name.trim(),pronouns:newAlt.pronouns,color:newAlt.color,avatar_emoji:newAlt.avatar_emoji},tk);setAlters(function(p){return p.concat([r[0]])});setNewAlt({name:"",pronouns:"",color:COLS[Math.floor(Math.random()*COLS.length)],avatar_emoji:"⭐"});setView("home");setToast({msg:r[0].name+" added!",type:"success"})}catch(e){setToast({msg:e.message,type:"error"})}};
  var delAlter=async function(id){if(alters.length<=1)return;try{await A.dl("alters","id=eq."+id,tk);var u=alters.filter(function(a){return a.id!==id});setAlters(u);if(active.id===id)setActive(u[0])}catch(e){}};
  var saveEdit=async function(){if(!editing)return;try{var r=await A.pa("alters","id=eq."+editing.id,{name:editing.name,pronouns:editing.pronouns,color:editing.color,avatar_emoji:editing.avatar_emoji},tk);setAlters(function(p){return p.map(function(a){return a.id===r[0].id?r[0]:a})});if(active.id===r[0].id)setActive(r[0]);setEditing(null);setToast({msg:"Saved!",type:"success"})}catch(e){}};
  var createGroup=async function(){if(!newGroup.name.trim())return;try{var r=await A.p("groups",{name:newGroup.name.trim(),emoji:newGroup.emoji,color:newGroup.color,created_by:sys.id},tk);await A.p("group_members",{group_id:r[0].id,system_id:sys.id},tk);for(var i=0;i<newGroup.members.length;i++){await A.p("group_members",{group_id:r[0].id,system_id:newGroup.members[i]},tk)}setNewGroup({name:"",emoji:"🌐",color:COLS[4],members:[]});setView("home");loadGroups();setToast({msg:"Group created!",type:"success"})}catch(e){setToast({msg:e.message,type:"error"})}};
  var copyCode=function(){if(navigator.clipboard)navigator.clipboard.writeText(sys.system_code);setToast({msg:"Copied!",type:"success"})};
  var nav=function(v){setView(v);setDrawer(false)};
  var allAlters=useMemo(function(){var m={};alters.forEach(function(a){m[a.id]=a});Object.values(connAlts).flat().forEach(function(a){m[a.id]=a});return m},[alters,connAlts]);
  var sortedConns=useMemo(function(){return conns.slice().sort(function(a,b){var la=lastMsgs[a.otherSystem.id];var lb=lastMsgs[b.otherSystem.id];if(!la&&!lb)return 0;if(!la)return 1;if(!lb)return-1;return new Date(lb.created_at)-new Date(la.created_at)})},[conns,lastMsgs]);

  return (
    <div style={{height:"100%",display:"flex",overflow:"hidden"}} {...swipe}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null)}}/>}

      {/* DRAWER OVERLAY */}
      {drawer&&<div onClick={function(){setDrawer(false)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:50}}/>}

      {/* SIDE DRAWER */}
      <div style={{position:"fixed",left:0,top:0,bottom:0,width:285,background:C.side,borderRight:"1px solid "+C.bd,zIndex:51,transform:drawer?"translateX(0)":"translateX(-100%)",transition:"transform .25s cubic-bezier(.4,0,.2,1)",display:"flex",flexDirection:"column"}}>
        {/* System + alter switcher */}
        <div style={{padding:12,borderBottom:"1px solid "+C.bd}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <Badge a={active} sz={32} on/>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sys.display_name}</div><div style={{fontSize:10,color:C.t3,display:"flex",alignItems:"center",gap:4}}><span style={{letterSpacing:1}}>{sys.system_code}</span><button className="hov" onClick={copyCode} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}><ICopy sz={10} c={C.t3}/></button></div></div>
          </div>
          <div className="scrx" style={{display:"flex",gap:4,paddingBottom:2}}>
            {alters.map(function(a){return <div key={a.id} onClick={function(){switchAlter(a)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer",flexShrink:0}}>
              <Badge a={a} sz={24} on={active.id===a.id}/>
              <span style={{fontSize:7,color:active.id===a.id?a.color:C.t3,fontWeight:active.id===a.id?700:400}}>{a.name.substring(0,4)}</span>
            </div>})}
            <div onClick={function(){nav("addAlter")}} style={{width:24,height:24,borderRadius:"50%",border:"1px dashed "+C.bd,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}><IPlus sz={8} c={C.t3}/></div>
          </div>
        </div>

        {/* Connections with dropdowns */}
        <div className="scr" style={{flex:1,padding:"6px 4px"}}>
          <p style={{fontSize:9,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,padding:"6px 10px"}}>Connections</p>
          {sortedConns.map(function(conn){
            var s=conn.otherSystem;var sa=connAlts[s.id]||[];var exp=drawerExp[s.id];
            return <div key={conn.id}>
              <div className="hov" style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,cursor:"pointer"}} onClick={function(){setDrawerExp(function(p){var n=Object.assign({},p);n[s.id]=!p[s.id];return n})}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.s3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.t2}}>{s.display_name.charAt(0)}</div>
                <span style={{flex:1,fontWeight:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.display_name}</span>
                <span style={{fontSize:10,color:C.t3}}>{sa.length}</span>
                {exp?<IChevDown sz={12} c={C.t3}/>:<IChevRight sz={12} c={C.t3}/>}
              </div>
              {exp&&<div style={{paddingLeft:12,paddingBottom:4}}>
                {/* Group by my alter */}
                {alters.map(function(myAlt){return <div key={myAlt.id}>
                  <p style={{fontSize:9,color:myAlt.color,fontWeight:600,padding:"4px 8px",opacity:.7}}>{myAlt.name}</p>
                  {sa.map(function(theirAlt){return <div key={theirAlt.id} className="hov" onClick={function(){openDM(myAlt,theirAlt,s)}} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:6,cursor:"pointer",fontSize:12}}>
                    <Badge a={myAlt} sz={16}/><span style={{color:C.t3}}>+</span><Badge a={theirAlt} sz={16}/><span style={{color:C.t2,flex:1}}>{theirAlt.name}</span>
                  </div>})}
                </div>})}
                <button className="hov" onClick={function(){unfriend(conn.id,s.display_name)}} style={Object.assign({},BT,{width:"100%",padding:"5px 8px",background:"transparent",border:"none",color:C.er,fontSize:11,justifyContent:"flex-start",gap:5,marginTop:2})}><IUserX sz={11}/>Unfriend</button>
              </div>}
            </div>
          })}
          <button className="hov" onClick={function(){nav("addContact")}} style={Object.assign({},BT,{width:"100%",padding:"7px 10px",background:"transparent",color:C.t3,border:"none",fontSize:12,justifyContent:"flex-start",gap:6})}><IUserPlus sz={13}/>Add system</button>

          <div style={{height:1,background:C.bd,margin:"6px 8px"}}/>
          <p style={{fontSize:9,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,padding:"4px 10px"}}>Groups</p>
          {groups.map(function(g){return <div key={g.id} className="hov" onClick={function(){openGrp(g)}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,cursor:"pointer"}}>
            <span style={{fontSize:14}}>{g.emoji}</span><span style={{fontWeight:500,fontSize:13}}>{g.name}</span>
          </div>})}
          <button className="hov" onClick={function(){nav("addGroup")}} style={Object.assign({},BT,{width:"100%",padding:"7px 10px",background:"transparent",color:C.t3,border:"none",fontSize:12,justifyContent:"flex-start",gap:6})}><IPlus sz={12}/>New group</button>

          <div style={{height:1,background:C.bd,margin:"6px 8px"}}/>
          <button className="hov" onClick={function(){nav("profile")}} style={Object.assign({},BT,{width:"100%",padding:"7px 10px",background:"transparent",color:C.t2,border:"none",fontSize:13,justifyContent:"flex-start",gap:8})}><ISettings sz={14}/>Settings</button>
        </div>
        <div style={{padding:"8px 8px",borderTop:"1px solid "+C.bd}}>
          <button className="hov" onClick={onLogout} style={Object.assign({},BT,{width:"100%",padding:8,background:"transparent",color:C.er,border:"none",fontSize:13,justifyContent:"flex-start",gap:8})}><ILogOut sz={14}/>Log Out</button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",width:"100%"}}>

        {/* HEADER */}
        <div style={{padding:"8px 12px",background:C.s1,borderBottom:"1px solid "+C.bd,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          {inChat?<button className="hov" onClick={function(){setView("home");clearInterval(pollRef.current)}} style={Object.assign({},BT,{padding:4,background:"transparent",color:C.t2,border:"none"})}><IBack sz={20}/></button>
          :<button className="hov" onClick={function(){setDrawer(true)}} style={Object.assign({},BT,{padding:4,background:"transparent",color:C.t2,border:"none"})}><IMenu sz={20}/></button>}

          {view==="chat"&&chatTarget?<div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
            <Badge a={chatTarget.theirAlter} sz={28}/>
            <div><div style={{fontWeight:600,fontSize:13}}>{chatTarget.theirAlter.name}</div><div style={{fontSize:10,color:C.t2}}>{chatTarget.system.display_name}</div></div>
          </div>:view==="groupChat"&&activeGroup?<div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
            <span style={{fontSize:15}}>{activeGroup.emoji}</span><span style={{fontWeight:600,fontSize:14}}>{activeGroup.name}</span>
          </div>:<div style={{flex:1,display:"flex",alignItems:"center",gap:6}}>
            <svg width="16" height="16" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="none" stroke={C.ac} strokeWidth="2.5" opacity=".5"/><path d="M28 10a18 18 0 0112.73 30.73" fill="none" stroke={C.ac} strokeWidth="2.5" strokeLinecap="round"/></svg>
            <span style={{fontWeight:800,fontSize:16}}>Plural</span>
            {pending.length>0&&<span style={{minWidth:16,height:16,borderRadius:8,background:C.er,color:"white",fontSize:9,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{pending.length}</span>}
          </div>}

          {/* ALWAYS VISIBLE ALTER SWITCHER */}
          <div className="scrx" style={{display:"flex",gap:3,maxWidth:120}}>
            {alters.map(function(a){return <div key={a.id} onClick={function(){
              if(view==="chat"&&chatTarget){
                // Switch to this alter's conversation with same person
                switchConvo(a,chatTarget.theirAlter);
              } else {
                switchAlter(a);
              }
            }} style={{cursor:"pointer",flexShrink:0}}>
              <Badge a={a} sz={22} on={active.id===a.id}/>
            </div>})}
          </div>
        </div>

        {/* CONVERSATION TABS (in chat only) */}
        {view==="chat"&&chatTarget&&(function(){
          var sa=connAlts[chatTarget.system.id]||[];
          // Current alter's conversations with all their alters
          var currentTabs=sa.map(function(theirAlt){return{my:chatTarget.myAlter,their:theirAlt}});
          return <div style={{background:C.s1,borderBottom:"1px solid "+C.bd,flexShrink:0}}>
            {/* Compact tab bar */}
            <div style={{display:"flex",alignItems:"center"}}>
              <div className="scrx" style={{flex:1,display:"flex",gap:0,padding:"0 4px"}}>
                {currentTabs.map(function(tab){
                  var isActive=tab.their.id===chatTarget.theirAlter.id;
                  return <button key={tab.their.id} className="hov" onClick={function(){switchConvo(tab.my,tab.their)}} style={Object.assign({},BT,{padding:"6px 10px",background:isActive?C.s3:"transparent",color:isActive?C.tx:C.t3,border:"none",borderRadius:"8px 8px 0 0",fontSize:11,gap:4,borderBottom:isActive?"2px solid "+tab.their.color:"2px solid transparent",whiteSpace:"nowrap"})}>
                    <Badge a={tab.their} sz={14}/>{tab.their.name}
                  </button>
                })}
              </div>
              {/* Expand button to show ALL combos */}
              <button className="hov" onClick={function(){setChatTabOpen(function(p){return!p})}} style={Object.assign({},BT,{padding:"6px 8px",background:"transparent",color:C.t3,border:"none"})}>
                <IChevDown sz={14}/>
              </button>
            </div>
            {/* Expanded: all my alters × all their alters */}
            {chatTabOpen&&<div className="scr" style={{maxHeight:180,padding:"4px 8px 8px",borderTop:"1px solid "+C.bd,background:C.s2}}>
              {alters.map(function(myAlt){return <div key={myAlt.id} style={{marginBottom:4}}>

  },[]);

  var handleAuth=useCallback(async function(d){
    var sess={access_token:d.access_token,refresh_token:d.refresh_token,user:d.user};
    setSession(sess);LS.s("plural_session",sess);
    try{var s=await A.g("systems","user_id=eq."+d.user.id,d.access_token);if(s.length>0){setSys(s[0]);var a=await A.g("alters","system_id=eq."+s[0].id+"&order=created_at.asc",d.access_token);setAlts(a)}}catch(e){}
    setLoading(false);
  },[]);

  var logout=function(){LS.d("plural_session");setSession(null);setSys(null);setAlts(null)};

  if(loading)return <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><Spin sz={28}/></div>;
  if(!session)return <Auth onAuth={handleAuth}/>;
  if(!sys||!alts||!alts.length)return <Setup token={session.access_token} userId={session.user.id} onDone={function(s,a){setSys(s);setAlts(a)}}/>;
  return <Main session={session} system={sys} alters={alts} onLogout={logout} onRefresh={tryRefresh}/>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

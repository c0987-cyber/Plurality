<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#0a0b10;color:#e4e6f0;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#252842;border-radius:2px}
::placeholder{color:#4d5268}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease both}.si{animation:si .15s ease both}.pop{animation:pop .2s ease both}
.hov:active{opacity:0.7}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
var h = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback, useRef = React.useRef, useMemo = React.useMemo;

var SB = "https://mnwkluvexuxzdxuhpzwc.supabase.co";
var SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ud2tsdXZleHV4emR4dWhwendjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjgzNDAsImV4cCI6MjA5MDkwNDM0MH0.9I7G0TVQd9T88MSuKU28TdJRY78oJ0u0I0rTzRhkLwU";

var LS = {
  get: function(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set: function(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  del: function(k) { try { localStorage.removeItem(k); } catch(e) {} }
};

var hd = function(t) { return { apikey: SK, Authorization: "Bearer " + (t || SK), "Content-Type": "application/json", Prefer: "return=representation" }; };
var db = {
  signup: async function(e, p) { var r = await fetch(SB+"/auth/v1/signup",{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})}); var d = await r.json(); if(d.error||d.msg) throw new Error((d.error&&d.error.message)||d.msg); return d; },
  login: async function(e, p) { var r = await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({email:e,password:p})}); var d = await r.json(); if(d.error) throw new Error(d.error_description||d.error); return d; },
  get: async function(t, q, tk) { var r = await fetch(SB+"/rest/v1/"+t+"?"+(q||""),{headers:hd(tk)}); if(!r.ok){var e=await r.json();throw new Error(e.message||"Fail");} return r.json(); },
  post: async function(t, d, tk) { var r = await fetch(SB+"/rest/v1/"+t,{method:"POST",headers:hd(tk),body:JSON.stringify(d)}); if(!r.ok){var e=await r.json();throw new Error(e.message||"Fail");} return r.json(); },
  patch: async function(t, q, d, tk) { var r = await fetch(SB+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:hd(tk),body:JSON.stringify(d)}); if(!r.ok){var e=await r.json();throw new Error(e.message||"Fail");} return r.json(); },
  del: async function(t, q, tk) { var r = await fetch(SB+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:hd(tk)}); if(!r.ok){var e=await r.json();throw new Error(e.message||"Fail");} }
};

var COLS = ["#ff6b8a","#ffa26b","#ffd66b","#6bffa2","#6bcfff","#b46bff","#ff6bdb","#6bffef","#ff8f6b","#a5ff6b"];
var EMO = ["🌀","🌙","⭐","🔥","💜","🌊","🌸","⚡","🦋","🍄","🎭","💫","🌿","❄️","🎪","☁️","🪐","🫧"];
var GEMO = ["🌐","💬","🏠","🎪","🌈","🔮","🎵","🌺","⚔️","🧩"];
function gc(){var c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",r="";for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function ago(d){var s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return "now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";if(s<604800)return Math.floor(s/86400)+"d";return new Date(d).toLocaleDateString();}
function dayLabel(d){var dt=new Date(d);var today=new Date();if(dt.toDateString()===today.toDateString())return "Today";var y=new Date(today);y.setDate(y.getDate()-1);if(dt.toDateString()===y.toDateString())return "Yesterday";return dt.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});}

var C = {bg:"#0a0b10",s1:"#111219",s2:"#16171f",s3:"#1c1d2a",s4:"#232536",bd:"#252842",bd2:"#353860",tx:"#e4e6f0",t2:"#8890a8",t3:"#4d5268",ac:"#b4a5ff",ok:"#6bffa2",wn:"#ffd66b",er:"#ff6b8a"};
var IS={width:"100%",padding:"11px 14px",background:C.s2,border:"1px solid "+C.bd,borderRadius:"10px",color:C.tx,fontSize:"15px",outline:"none",transition:"border .2s"};
var BT={padding:"11px 20px",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:600,cursor:"pointer",transition:"all .15s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:"7px"};

function Spin({sz}){return <svg width={sz||18} height={sz||18} viewBox="0 0 24 24" fill="none" stroke={C.ac} strokeWidth="2" style={{animation:"spin 1s linear infinite"}}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>;}

function Badge({a, sz, on, onClick, style:st}) {
  var size = sz || 34;
  return (
    <div onClick={onClick} style={Object.assign({width:size,height:size,borderRadius:"50%",background:a.color+"20",border:"2px solid "+(on?a.color:"transparent"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.44,cursor:onClick?"pointer":"default",transition:"all .2s",flexShrink:0,boxShadow:on?"0 0 12px "+a.color+"33":"none"},st||{})}>
      {a.avatar_emoji}
    </div>
  );
}

function Toast({msg,type,onClose}){
  useEffect(function(){var x=setTimeout(onClose,3000);return function(){clearTimeout(x);};},[]);
  var bg=type==="error"?C.er:type==="success"?C.ok:C.ac;
  return <div className="pop" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",padding:"9px 20px",borderRadius:10,background:bg,color:"#0a0b10",fontWeight:600,fontSize:13,zIndex:9999,boxShadow:"0 4px 24px "+bg+"55"}}>{msg}</div>;
}

// ===== AUTH =====
function Auth({onAuth}) {
  var _m=useState("login"),m=_m[0],setM=_m[1];
  var _e=useState(""),email=_e[0],setEmail=_e[1];
  var _p=useState(""),pw=_p[0],setPw=_p[1];
  var _l=useState(false),ld=_l[0],setLd=_l[1];
  var _er=useState(""),err=_er[0],setErr=_er[1];
  var go=async function(){
    if(!email||!pw)return setErr("Fill in both fields");
    if(pw.length<6)return setErr("Password needs 6+ chars");
    setLd(true);setErr("");
    try{if(m==="signup"){var d=await db.signup(email,pw);if(d.access_token)onAuth(d);else{setM("login");setErr("Check email to confirm, then log in!");}}else{onAuth(await db.login(email,pw));}}catch(e){setErr(e.message);}setLd(false);
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"radial-gradient(ellipse at 50% 0%, #1a1040 0%, "+C.bg+" 70%)"}}>
      <div className="fi" style={{width:"100%",maxWidth:340}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:56,marginBottom:8,filter:"drop-shadow(0 0 30px rgba(180,165,255,0.4))"}}>🌀</div>
          <h1 style={{fontSize:32,fontWeight:800,letterSpacing:"-1px",background:"linear-gradient(135deg, #e4e6f0, #b4a5ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Plural</h1>
          <p style={{color:C.t2,fontSize:14,marginTop:6}}>A space for every part of you</p>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:20,background:C.s2,borderRadius:10,padding:3}}>
          {["login","signup"].map(function(x){return <button key={x} onClick={function(){setM(x);setErr("");}} style={Object.assign({},BT,{flex:1,padding:"9px 0",background:m===x?C.s4:"transparent",color:m===x?C.tx:C.t3,borderRadius:8,fontSize:13})}>{x==="login"?"Log In":"Sign Up"}</button>;})}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input type="email" placeholder="Email" value={email} onChange={function(e){setEmail(e.target.value);}} style={IS} onFocus={function(e){e.target.style.borderColor=C.ac;}} onBlur={function(e){e.target.style.borderColor=C.bd;}} onKeyDown={function(e){if(e.key==="Enter")go();}}/>
          <input type="password" placeholder="Password" value={pw} onChange={function(e){setPw(e.target.value);}} style={IS} onFocus={function(e){e.target.style.borderColor=C.ac;}} onBlur={function(e){e.target.style.borderColor=C.bd;}} onKeyDown={function(e){if(e.key==="Enter")go();}}/>
          {err && <p style={{color:err.indexOf("confirm")>-1?C.wn:C.er,fontSize:12,textAlign:"center"}}>{err}</p>}
          <button onClick={go} disabled={ld} style={Object.assign({},BT,{width:"100%",marginTop:4,background:"linear-gradient(135deg, #b4a5ff, #8a7acc)",color:"#0a0b10",padding:"13px 20px",fontSize:15,opacity:ld?0.6:1,borderRadius:12})}>{ld?<Spin/>:m==="login"?"Log In":"Create Account"}</button>
        </div>
      </div>
    </div>
  );
}

// ===== SETUP =====
function Setup({token,userId,onDone}) {
  var _st=useState(1),step=_st[0],setStep=_st[1];
  var _sn=useState(""),sn=_sn[0],setSn=_sn[1];
  var _an=useState(""),an=_an[0],setAn=_an[1];
  var _ap=useState(""),ap=_ap[0],setAp=_ap[1];
  var _ac=useState(COLS[5]),ac=_ac[0],setAc=_ac[1];
  var _ae=useState("🌀"),ae=_ae[0],setAe=_ae[1];
  var _ld=useState(false),ld=_ld[0],setLd=_ld[1];
  var finish=async function(){if(!sn.trim()||!an.trim())return;setLd(true);try{var r1=await db.post("systems",{user_id:userId,display_name:sn.trim(),system_code:gc()},token);var r2=await db.post("alters",{system_id:r1[0].id,name:an.trim(),pronouns:ap.trim(),color:ac,avatar_emoji:ae},token);onDone(r1[0],[r2[0]]);}catch(e){try{var r3=await db.post("systems",{user_id:userId,display_name:sn.trim(),system_code:gc()},token);var r4=await db.post("alters",{system_id:r3[0].id,name:an.trim(),pronouns:ap.trim(),color:ac,avatar_emoji:ae},token);onDone(r3[0],[r4[0]]);}catch(e2){alert(e2.message);}}setLd(false);};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fi" style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>{[1,2].map(function(i){return <div key={i} style={{width:40,height:4,borderRadius:2,background:step>=i?C.ac:C.bd}}/>;})}</div>
          <h2 style={{fontSize:22,fontWeight:600}}>{step===1?"Name your system":"Create your first alter"}</h2>
        </div>
        {step===1?(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input placeholder="e.g. The Aurora System" value={sn} onChange={function(e){setSn(e.target.value);}} style={IS} onKeyDown={function(e){if(e.key==="Enter"&&sn.trim())setStep(2);}}/>
            <button onClick={function(){setStep(2);}} disabled={!sn.trim()} style={Object.assign({},BT,{background:C.ac,color:"#0a0b10",opacity:sn.trim()?1:0.4})}>Next</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input placeholder="Alter name" value={an} onChange={function(e){setAn(e.target.value);}} style={IS}/>
            <input placeholder="Pronouns (optional)" value={ap} onChange={function(e){setAp(e.target.value);}} style={IS}/>
            <div><p style={{fontSize:12,color:C.t2,marginBottom:6}}>Color</p><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setAc(c);}} style={{width:30,height:30,borderRadius:"50%",background:c,cursor:"pointer",border:ac===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
            <div><p style={{fontSize:12,color:C.t2,marginBottom:6}}>Emoji</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setAe(em);}} style={{width:34,height:34,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer",background:ae===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={function(){setStep(1);}} style={Object.assign({},BT,{flex:1,background:"transparent",color:C.t2,border:"1px solid "+C.bd})}>Back</button>
              <button onClick={finish} disabled={!an.trim()||ld} style={Object.assign({},BT,{flex:2,background:C.ac,color:"#0a0b10",opacity:an.trim()&&!ld?1:0.4})}>{ld?<Spin/>:"Let's go ✨"}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== MAIN =====
function Main({session,system:initSys,alters:initAlts,onLogout}) {
  var tk=session.access_token;
  var _sys=useState(initSys),sys=_sys[0];
  var _alters=useState(initAlts),alters=_alters[0],setAlters=_alters[1];
  var _active=useState(initAlts[0]),active=_active[0],setActive=_active[1];
  var _conns=useState([]),conns=_conns[0],setConns=_conns[1];
  var _ca=useState({}),connAlts=_ca[0],setConnAlts=_ca[1];
  var _connSys=useState({}),connSystems=_connSys[0],setConnSystems=_connSys[1];
  var _pending=useState([]),pending=_pending[0],setPending=_pending[1];
  var _groups=useState([]),groups=_groups[0],setGroups=_groups[1];
  var _gm=useState({}),groupMembers=_gm[0],setGroupMembers=_gm[1];
  var _tab=useState("dms"),tab=_tab[0],setTab=_tab[1];
  var _view=useState("list"),view=_view[0],setView=_view[1];
  var _ct=useState(null),chatTarget=_ct[0],setChatTarget=_ct[1];
  var _ag=useState(null),activeGroup=_ag[0],setActiveGroup=_ag[1];
  var _msgs=useState([]),msgs=_msgs[0],setMsgs=_msgs[1];
  var _mi=useState(""),msgIn=_mi[0],setMsgIn=_mi[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var endRef=useRef(null);var pollRef=useRef(null);
  var _toast=useState(null),toast=_toast[0],setToast=_toast[1];
  var _sc=useState(""),searchCode=_sc[0],setSearchCode=_sc[1];
  var _sr=useState(null),searchRes=_sr[0],setSearchRes=_sr[1];
  var _sl=useState(false),searchLd=_sl[0],setSearchLd=_sl[1];
  var _na=useState({name:"",pronouns:"",color:COLS[0],avatar_emoji:"⭐"}),newAlt=_na[0],setNewAlt=_na[1];
  var _ed=useState(null),editing=_ed[0],setEditing=_ed[1];
  var _ng=useState({name:"",emoji:"🌐",color:COLS[4],members:[]}),newGroup=_ng[0],setNewGroup=_ng[1];
  var _lastMsgs=useState({}),lastMsgs=_lastMsgs[0],setLastMsgs=_lastMsgs[1];
  var _expanded=useState({}),expanded=_expanded[0],setExpanded=_expanded[1];

  // Load connections
  var loadConns=useCallback(async function(){try{
    var ac2=await db.get("connections","or=(requester_id.eq."+sys.id+",receiver_id.eq."+sys.id+")&status=eq.accepted",tk);
    var pd=await db.get("connections","receiver_id=eq."+sys.id+"&status=eq.pending",tk);
    var allIds=ac2.flatMap(function(c){return[c.requester_id,c.receiver_id];}).concat(pd.map(function(p){return p.requester_id;}));
    var ids=allIds.filter(function(x,i,a){return x!==sys.id&&a.indexOf(x)===i;});
    if(ids.length>0){
      var ss=await db.get("systems","id=in.("+ids.join(",")+")",tk);
      var aa=await db.get("alters","system_id=in.("+ids.join(",")+")",tk);
      var am={};aa.forEach(function(a){if(!am[a.system_id])am[a.system_id]=[];am[a.system_id].push(a);});
      var sm={};ss.forEach(function(s){sm[s.id]=s;});
      setConnSystems(sm);
      setConns(ac2.map(function(c){var o=c.requester_id===sys.id?c.receiver_id:c.requester_id;return Object.assign({},c,{otherSystem:ss.find(function(s){return s.id===o;})});}).filter(function(c){return c.otherSystem;}));
      setPending(pd.map(function(p){return Object.assign({},p,{otherSystem:ss.find(function(s){return s.id===p.requester_id;})});}).filter(function(p){return p.otherSystem;}));
      setConnAlts(am);
    }else{setConns([]);setPending(pd);}
  }catch(e){console.error(e);}},[sys.id,tk]);

  var loadGroups=useCallback(async function(){try{
    var mg=await db.get("group_members","system_id=eq."+sys.id+"&select=group_id",tk);
    if(mg.length>0){var gids=mg.map(function(g){return g.group_id;});var gs=await db.get("groups","id=in.("+gids.join(",")+")",tk);setGroups(gs);
      var mb=await db.get("group_members","group_id=in.("+gids.join(",")+")",tk);var mm={};mb.forEach(function(m){if(!mm[m.group_id])mm[m.group_id]=[];mm[m.group_id].push(m);});setGroupMembers(mm);
    }else{setGroups([]);}
  }catch(e){console.error(e);}},[sys.id,tk]);

  useEffect(function(){loadConns();loadGroups();},[loadConns,loadGroups]);

  // Load last messages for DM previews
  useEffect(function(){
    if(!conns.length||!alters.length)return;
    var loadLast=async function(){
      var lm={};
      var myAlterIds=alters.map(function(a){return a.id;});
      for(var i=0;i<conns.length;i++){
        var s=conns[i].otherSystem;
        var theirAlts=connAlts[s.id]||[];
        if(!theirAlts.length)continue;
        var theirIds=theirAlts.map(function(a){return a.id;});
        try{
          var r=await db.get("messages","or=(and(sender_alter_id.in.("+myAlterIds.join(",")+"),receiver_alter_id.in.("+theirIds.join(",")+")),and(sender_alter_id.in.("+theirIds.join(",")+"),receiver_alter_id.in.("+myAlterIds.join(",")+")))"+"&order=created_at.desc&limit=1",tk);
          if(r.length>0)lm[s.id]=r[0];
        }catch(e){}
      }
      setLastMsgs(lm);
    };
    loadLast();
    var iv=setInterval(loadLast,8000);
    return function(){clearInterval(iv);};
  },[conns,connAlts,alters,tk]);

  // Poll chat messages
  useEffect(function(){
    if(view!=="chat"||!chatTarget||!active)return;
    var load=async function(){try{var my=active.id,th=chatTarget.alter.id;setMsgs(await db.get("messages","or=(and(sender_alter_id.eq."+my+",receiver_alter_id.eq."+th+"),and(sender_alter_id.eq."+th+",receiver_alter_id.eq."+my+"))&order=created_at.asc",tk));}catch(e){}};
    load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current);};
  },[view,chatTarget&&chatTarget.alter&&chatTarget.alter.id,active&&active.id,tk]);

  useEffect(function(){
    if(view!=="groupChat"||!activeGroup)return;
    var load=async function(){try{setMsgs(await db.get("group_messages","group_id=eq."+activeGroup.id+"&order=created_at.asc",tk));}catch(e){}};
    load();pollRef.current=setInterval(load,2500);return function(){clearInterval(pollRef.current);};
  },[view,activeGroup&&activeGroup.id,tk]);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  // Actions
  var sendDM=async function(){if(!msgIn.trim()||!chatTarget||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await db.post("messages",{sender_alter_id:active.id,receiver_alter_id:chatTarget.alter.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]]);});}catch(e){setToast({msg:"Send failed",type:"error"});}setSending(false);};
  var sendGM=async function(){if(!msgIn.trim()||!activeGroup||sending)return;var c=msgIn.trim();setMsgIn("");setSending(true);try{var r=await db.post("group_messages",{group_id:activeGroup.id,sender_alter_id:active.id,content:c},tk);setMsgs(function(p){return p.concat([r[0]]);});}catch(e){setToast({msg:"Send failed",type:"error"});}setSending(false);};
  var deleteMsg=async function(id){try{await db.del("messages","id=eq."+id,tk);setMsgs(function(p){return p.filter(function(m){return m.id!==id;});});setToast({msg:"Deleted",type:"success"});}catch(e){setToast({msg:"Can't delete",type:"error"});}};
  var searchSys=async function(){if(!searchCode.trim())return;setSearchLd(true);setSearchRes(null);try{var r=await db.get("systems","system_code=eq."+searchCode.trim().toUpperCase(),tk);if(!r.length)setSearchRes({none:true});else if(r[0].id===sys.id)setSearchRes({self:true});else{var a=await db.get("alters","system_id=eq."+r[0].id,tk);setSearchRes({sys:r[0],alts:a});}}catch(e){setToast({msg:"Search failed",type:"error"});}setSearchLd(false);};
  var sendReq=async function(id){try{await db.post("connections",{requester_id:sys.id,receiver_id:id},tk);setToast({msg:"Request sent!",type:"success"});setSearchRes(null);setSearchCode("");}catch(e){setToast({msg:"Already connected",type:"error"});}};
  var acceptReq=async function(id){try{await db.patch("connections","id=eq."+id,{status:"accepted"},tk);setToast({msg:"Connected!",type:"success"});loadConns();}catch(e){}};
  var rejectReq=async function(id){try{await db.del("connections","id=eq."+id,tk);loadConns();}catch(e){}};
  var addAlterFn=async function(){if(!newAlt.name.trim())return;try{var r=await db.post("alters",{system_id:sys.id,name:newAlt.name.trim(),pronouns:newAlt.pronouns,color:newAlt.color,avatar_emoji:newAlt.avatar_emoji},tk);setAlters(function(p){return p.concat([r[0]]);});setNewAlt({name:"",pronouns:"",color:COLS[Math.floor(Math.random()*10)],avatar_emoji:"⭐"});setView("list");setToast({msg:r[0].name+" joined!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};
  var delAlter=async function(id){if(alters.length<=1)return setToast({msg:"Need at least one",type:"error"});try{await db.del("alters","id=eq."+id,tk);var u=alters.filter(function(a){return a.id!==id;});setAlters(u);if(active.id===id)setActive(u[0]);}catch(e){}};
  var saveEdit=async function(){if(!editing)return;try{var r=await db.patch("alters","id=eq."+editing.id,{name:editing.name,pronouns:editing.pronouns,color:editing.color,avatar_emoji:editing.avatar_emoji},tk);setAlters(function(p){return p.map(function(a){return a.id===r[0].id?r[0]:a;});});if(active.id===r[0].id)setActive(r[0]);setEditing(null);setToast({msg:"Saved!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};
  var createGroup=async function(){if(!newGroup.name.trim())return;try{var r=await db.post("groups",{name:newGroup.name.trim(),emoji:newGroup.emoji,color:newGroup.color,created_by:sys.id},tk);await db.post("group_members",{group_id:r[0].id,system_id:sys.id},tk);for(var i=0;i<newGroup.members.length;i++){await db.post("group_members",{group_id:r[0].id,system_id:newGroup.members[i]},tk);}setNewGroup({name:"",emoji:"🌐",color:COLS[4],members:[]});setView("list");loadGroups();setToast({msg:"Group created!",type:"success"});}catch(e){setToast({msg:e.message,type:"error"});}};
  var openDM=function(alt,s){setChatTarget({alter:alt,system:s});setMsgs([]);setView("chat");};
  var openGrp=function(g){setActiveGroup(g);setMsgs([]);setView("groupChat");};
  var copyCode=function(){if(navigator.clipboard)navigator.clipboard.writeText(sys.system_code);setToast({msg:"Copied!",type:"success"});};
  var allAlters=useMemo(function(){var m={};alters.forEach(function(a){m[a.id]=a;});Object.values(connAlts).flat().forEach(function(a){m[a.id]=a;});return m;},[alters,connAlts]);
  var inChat=view==="chat"||view==="groupChat";

  // Sort connections by last message time
  var sortedConns=useMemo(function(){return conns.slice().sort(function(a,b){var la=lastMsgs[a.otherSystem.id];var lb=lastMsgs[b.otherSystem.id];if(!la&&!lb)return 0;if(!la)return 1;if(!lb)return -1;return new Date(lb.created_at)-new Date(la.created_at);});},[conns,lastMsgs]);

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}

      {/* HEADER */}
      <div style={{padding:"10px 14px",background:C.s1,borderBottom:"1px solid "+C.bd,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {(inChat||view!=="list")&&<button className="hov" onClick={function(){setView("list");clearInterval(pollRef.current);}} style={Object.assign({},BT,{padding:5,background:"transparent",color:C.t2,border:"none"})}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>}
        {view==="chat"&&chatTarget?(
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <Badge a={chatTarget.alter} sz={32}/>
            <div><div style={{fontWeight:600,fontSize:15}}>{chatTarget.alter.name}</div><div style={{fontSize:11,color:C.t2}}>{chatTarget.system.display_name}</div></div>
          </div>
        ):view==="groupChat"&&activeGroup?(
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:activeGroup.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{activeGroup.emoji}</div>
            <div><div style={{fontWeight:600,fontSize:15}}>{activeGroup.name}</div><div style={{fontSize:11,color:C.t2}}>{(groupMembers[activeGroup.id]||[]).length} members</div></div>
          </div>
        ):(
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🌀</span>
            <span style={{fontWeight:800,fontSize:18,letterSpacing:"-0.5px"}}>Plural</span>
          </div>
        )}
      </div>

      {/* ALTER SWITCHER */}
      <div style={{padding:"7px 14px",background:C.s1,borderBottom:"1px solid "+C.bd,display:"flex",alignItems:"center",gap:6,overflowX:"auto",flexShrink:0}}>
        <span style={{fontSize:10,color:C.t3,flexShrink:0,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Front</span>
        {alters.map(function(a){return (
          <div key={a.id} onClick={function(){setActive(a);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer",flexShrink:0}}>
            <Badge a={a} sz={30} on={active.id===a.id}/>
            <span style={{fontSize:8,color:active.id===a.id?a.color:C.t3,fontWeight:active.id===a.id?700:400,maxWidth:38,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</span>
          </div>
        );})}
        <div onClick={function(){setView("addAlter");}} style={{width:30,height:30,borderRadius:"50%",border:"2px dashed "+C.bd,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </div>

      {/* TABS */}
      {view==="list"&&(
        <div style={{display:"flex",background:C.s1,borderBottom:"1px solid "+C.bd,flexShrink:0}}>
          {[{id:"dms",l:"Messages",b:pending.length},{id:"groups",l:"Groups",b:0},{id:"profile",l:"Profile",b:0}].map(function(x){return (
            <button key={x.id} onClick={function(){setTab(x.id);}} className="hov" style={Object.assign({},BT,{flex:1,borderRadius:0,padding:"9px 0",fontSize:12,fontWeight:tab===x.id?700:500,background:"transparent",color:tab===x.id?C.tx:C.t3,borderBottom:tab===x.id?"2px solid "+C.ac:"2px solid transparent"})}>
              {x.l}{x.b>0&&<span style={{minWidth:16,height:16,borderRadius:8,background:C.er,color:"white",fontSize:10,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px",marginLeft:4}}>{x.b}</span>}
            </button>
          );})}
        </div>
      )}

      {/* CONTENT */}
      <div style={{flex:1,overflow:"auto"}}>

        {/* DMS - Discord style */}
        {view==="list"&&tab==="dms"&&(
          <div className="fi">
            {pending.length>0&&(
              <div style={{padding:"12px 14px 0"}}>
                <p style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:6}}>Pending</p>
                {pending.map(function(p){return (
                  <div key={p.id} className="si" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:C.s2,borderRadius:10,marginBottom:4}}>
                    <span style={{fontWeight:500,fontSize:14}}>{p.otherSystem?p.otherSystem.display_name:""}</span>
                    <div style={{display:"flex",gap:4}}>
                      <button className="hov" onClick={function(){acceptReq(p.id);}} style={Object.assign({},BT,{padding:"5px 10px",background:C.ok,color:"#0a0b10",fontSize:12})}>✓</button>
                      <button className="hov" onClick={function(){rejectReq(p.id);}} style={Object.assign({},BT,{padding:"5px 10px",background:C.s3,color:C.t2,fontSize:12})}>✕</button>
                    </div>
                  </div>
                );})}
              </div>
            )}
            <div style={{padding:"12px 14px 0"}}>
              <button className="hov" onClick={function(){setView("addContact");}} style={Object.assign({},BT,{width:"100%",marginBottom:10,padding:11,background:"transparent",color:C.t2,border:"1px dashed "+C.bd,fontSize:13})}>
                + Add by system code
              </button>
            </div>

            {/* Discord-style DM list */}
            {sortedConns.length===0?(
              <div style={{textAlign:"center",padding:40,color:C.t3}}>
                <div style={{fontSize:40,marginBottom:10,opacity:0.3}}>💬</div>
                <p style={{fontSize:14}}>No conversations yet</p>
              </div>
            ):(<div>
              <p style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,padding:"8px 14px 4px"}}>Direct Messages</p>
              {sortedConns.map(function(conn){
                var s=conn.otherSystem;
                var sa=connAlts[s.id]||[];
                var lm=lastMsgs[s.id];
                var ex=expanded[s.id];
                var preview="";
                if(lm){
                  var senderAlt=allAlters[lm.sender_alter_id];
                  var isMine=alters.some(function(a){return a.id===lm.sender_alter_id;});
                  preview=(isMine?"You":senderAlt?senderAlt.name:"?")+": "+lm.content;
                  if(preview.length>40)preview=preview.substring(0,40)+"...";
                }
                return (
                  <div key={conn.id}>
                    <div className="hov" onClick={function(){setExpanded(function(p){var n={};for(var k in p)n[k]=p[k];n[s.id]=!p[s.id];return n;});}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",transition:"background .1s"}}>
                      <div style={{position:"relative"}}>
                        <div style={{width:40,height:40,borderRadius:"50%",background:C.s3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:C.t2}}>
                          {s.display_name.charAt(0).toUpperCase()}
                        </div>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontWeight:600,fontSize:14}}>{s.display_name}</span>
                          {lm&&<span style={{fontSize:10,color:C.t3}}>{ago(lm.created_at)}</span>}
                        </div>
                        <p style={{fontSize:12,color:C.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>
                          {preview||sa.length+" alter"+(sa.length!==1?"s":"")}
                        </p>
                      </div>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2"><path d={ex?"M6 9l6 6 6-6":"M9 18l6-6-6-6"}/></svg>
                    </div>
                    {ex&&(
                      <div style={{background:C.s2,margin:"0 8px 4px",borderRadius:10,padding:"4px 6px"}}>
                        {sa.map(function(alt){return (
                          <div key={alt.id} className="hov" onClick={function(){openDM(alt,s);}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,cursor:"pointer"}}>
                            <Badge a={alt} sz={26}/>
                            <span style={{fontWeight:500,fontSize:13,flex:1}}>{alt.name}</span>
                            {alt.pronouns&&<span style={{fontSize:10,color:C.t3}}>{alt.pronouns}</span>}
                          </div>
                        );})}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>)}
          </div>
        )}

        {/* GROUPS */}
        {view==="list"&&tab==="groups"&&(
          <div className="fi" style={{padding:14}}>
            <button className="hov" onClick={function(){setView("addGroup");}} style={Object.assign({},BT,{width:"100%",marginBottom:10,padding:11,background:"transparent",color:C.t2,border:"1px dashed "+C.bd,fontSize:13})}>+ Create a group</button>
            {groups.length===0?(
              <div style={{textAlign:"center",padding:36,color:C.t3}}><div style={{fontSize:36,marginBottom:8,opacity:0.3}}>🏠</div><p style={{fontSize:14}}>No groups yet</p></div>
            ):groups.map(function(g){return (
              <div key={g.id} className="hov" onClick={function(){openGrp(g);}} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:C.s2,borderRadius:10,marginBottom:4,cursor:"pointer"}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:g.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{g.emoji}</div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{g.name}</div><div style={{fontSize:11,color:C.t3}}>{(groupMembers[g.id]||[]).length} members</div></div>
              </div>
            );})}
          </div>
        )}

        {/* PROFILE */}
        {view==="list"&&tab==="profile"&&(
          <div className="fi" style={{padding:14}}>
            <div style={{background:"linear-gradient(135deg, "+C.ac+"15, "+C.s2+")",borderRadius:14,padding:20,marginBottom:14,border:"1px solid "+C.bd}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:C.ac+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{alters[0].avatar_emoji}</div>
                <div><h2 style={{fontSize:18,fontWeight:700}}>{sys.display_name}</h2><p style={{fontSize:12,color:C.t2}}>{alters.length} alter{alters.length!==1?"s":""}</p></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,background:C.s1,borderRadius:8,padding:"8px 12px"}}>
                <span style={{fontSize:10,color:C.t3,fontWeight:600}}>CODE</span>
                <span style={{fontWeight:700,letterSpacing:3,color:C.ac,fontSize:16,flex:1}}>{sys.system_code}</span>
                <button className="hov" onClick={copyCode} style={Object.assign({},BT,{padding:4,background:"transparent",border:"none",color:C.t2})}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                </button>
              </div>
            </div>
            <p style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:8,fontWeight:700}}>Alters</p>
            {alters.map(function(a){return (
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.s2,borderRadius:10,marginBottom:4,border:active.id===a.id?"1px solid "+a.color+"44":"1px solid transparent"}}>
                <Badge a={a} sz={36} on={active.id===a.id}/>
                <div style={{flex:1}}><span style={{fontWeight:600,fontSize:14}}>{a.name}</span>{a.pronouns&&<span style={{fontSize:11,color:C.t3,marginLeft:5}}>{a.pronouns}</span>}</div>
                <button className="hov" onClick={function(){setEditing(Object.assign({},a));}} style={Object.assign({},BT,{padding:5,background:"transparent",border:"none",color:C.t2})}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                {alters.length>1&&<button className="hov" onClick={function(){if(confirm("Remove "+a.name+"?"))delAlter(a.id);}} style={Object.assign({},BT,{padding:5,background:"transparent",border:"none",color:C.er})}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>}
              </div>
            );})}
            <button className="hov" onClick={onLogout} style={Object.assign({},BT,{width:"100%",marginTop:20,background:"transparent",color:C.er,border:"1px solid "+C.er+"33"})}>Log Out</button>
          </div>
        )}

        {/* ADD CONTACT */}
        {view==="addContact"&&(
          <div className="fi" style={{padding:14}}>
            <div style={{background:C.s2,borderRadius:14,padding:16,marginBottom:14,border:"1px solid "+C.bd}}>
              <p style={{fontSize:10,color:C.t3,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Your code</p>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:26,fontWeight:800,letterSpacing:5,color:C.ac}}>{sys.system_code}</span>
                <button className="hov" onClick={copyCode} style={Object.assign({},BT,{padding:4,background:"transparent",border:"none",color:C.t2})}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                </button>
              </div>
            </div>
            <div style={{display:"flex",gap:7,marginBottom:14}}>
              <input placeholder="Their code" value={searchCode} onChange={function(e){setSearchCode(e.target.value.toUpperCase());}} maxLength={6} style={Object.assign({},IS,{flex:1,letterSpacing:4,fontWeight:700,textAlign:"center",fontSize:18})} onKeyDown={function(e){if(e.key==="Enter")searchSys();}}/>
              <button className="hov" onClick={searchSys} disabled={searchLd} style={Object.assign({},BT,{padding:"11px 16px",background:C.ac,color:"#0a0b10"})}>
                {searchLd?<Spin sz={14}/>:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>}
              </button>
            </div>
            {searchRes&&(
              <div className="fi" style={{background:C.s2,borderRadius:14,padding:14}}>
                {searchRes.none?<p style={{color:C.t3,textAlign:"center",fontSize:13}}>No system found</p>
                :searchRes.self?<p style={{color:C.t3,textAlign:"center",fontSize:13}}>That's you!</p>
                :(
                  <div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div><h3 style={{fontSize:15,fontWeight:600}}>{searchRes.sys.display_name}</h3><p style={{fontSize:11,color:C.t3}}>{searchRes.alts.length} alter{searchRes.alts.length!==1?"s":""}</p></div>
                      <button className="hov" onClick={function(){sendReq(searchRes.sys.id);}} style={Object.assign({},BT,{fontSize:12,padding:"7px 14px",background:C.ac,color:"#0a0b10"})}>+ Add</button>
                    </div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{searchRes.alts.map(function(a){return <div key={a.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px 3px 3px",background:C.s3,borderRadius:14}}><Badge a={a} sz={18}/><span style={{fontSize:11}}>{a.name}</span></div>;})}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ADD ALTER */}
        {view==="addAlter"&&(
          <div className="fi" style={{padding:14}}>
            <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>New Alter</h2>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="Name" value={newAlt.name} onChange={function(e){setNewAlt(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <input placeholder="Pronouns" value={newAlt.pronouns} onChange={function(e){setNewAlt(function(p){return Object.assign({},p,{pronouns:e.target.value});});}} style={IS}/>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{color:c});});}} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:newAlt.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setNewAlt(function(p){return Object.assign({},p,{avatar_emoji:em});});}} style={{width:32,height:32,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer",background:newAlt.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
              <button className="hov" onClick={addAlterFn} disabled={!newAlt.name.trim()} style={Object.assign({},BT,{marginTop:6,background:C.ac,color:"#0a0b10",opacity:newAlt.name.trim()?1:0.4})}>+ Add Alter</button>
            </div>
          </div>
        )}

        {/* ADD GROUP */}
        {view==="addGroup"&&(
          <div className="fi" style={{padding:14}}>
            <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>New Group</h2>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="Group name" value={newGroup.name} onChange={function(e){setNewGroup(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{GEMO.map(function(em){return <div key={em} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{emoji:em});});}} style={{width:34,height:34,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer",background:newGroup.emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setNewGroup(function(p){return Object.assign({},p,{color:c});});}} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:newGroup.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              {conns.length>0&&<div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Add systems</p>{conns.map(function(c){var s=c.otherSystem;var sel=newGroup.members.indexOf(s.id)>-1;return <div key={s.id} className="hov" onClick={function(){setNewGroup(function(p){return Object.assign({},p,{members:sel?p.members.filter(function(x){return x!==s.id;}):p.members.concat([s.id])});});}} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:8,cursor:"pointer",background:sel?C.ac+"15":"transparent"}}><div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(sel?C.ac:C.bd),background:sel?C.ac:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0a0b10" strokeWidth="4"><path d="M20 6L9 17l-5-5"/></svg>}</div><span style={{fontWeight:500,fontSize:13}}>{s.display_name}</span></div>;})}</div>}
              <button className="hov" onClick={createGroup} disabled={!newGroup.name.trim()} style={Object.assign({},BT,{marginTop:6,background:C.ac,color:"#0a0b10",opacity:newGroup.name.trim()?1:0.4})}>Create Group</button>
            </div>
          </div>
        )}

        {/* DM CHAT */}
        {view==="chat"&&chatTarget&&(
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{flex:1,overflow:"auto",padding:"10px 14px",display:"flex",flexDirection:"column",gap:2}}>
              {msgs.length===0&&<div style={{textAlign:"center",padding:32,color:C.t3}}><p style={{fontSize:13}}>Start chatting</p><p style={{marginTop:3}}><span style={{color:active.color,fontWeight:600}}>{active.name}</span>{" & "}<span style={{color:chatTarget.alter.color,fontWeight:600}}>{chatTarget.alter.name}</span></p></div>}
              {msgs.map(function(m,i){
                var mine=m.sender_alter_id===active.id;
                var sa=mine?active:chatTarget.alter;
                var prevMsg=msgs[i-1];
                var sameSender=prevMsg&&prevMsg.sender_alter_id===m.sender_alter_id;
                var prevDate=prevMsg?new Date(prevMsg.created_at).toDateString():"";
                var thisDate=new Date(m.created_at).toDateString();
                var showDay=prevDate!==thisDate;
                return (
                  <React.Fragment key={m.id}>
                    {showDay&&<div style={{textAlign:"center",padding:"8px 0",margin:"4px 0"}}><span style={{fontSize:10,color:C.t3,background:C.s2,padding:"3px 10px",borderRadius:10,fontWeight:600}}>{dayLabel(m.created_at)}</span></div>}
                    <div style={{display:"flex",justifyContent:mine?"flex-end":"flex-start",marginTop:sameSender?1:6}}>
                      <div style={{maxWidth:"82%",display:"flex",gap:4,flexDirection:mine?"row-reverse":"row",alignItems:"flex-end"}}>
                        {!sameSender?<Badge a={sa} sz={20}/>:<div style={{width:20,flexShrink:0}}/>}
                        <div onDoubleClick={mine?function(){if(confirm("Delete?"))deleteMsg(m.id);}:undefined} style={{padding:"8px 12px",borderRadius:sameSender?12:14,borderBottomRightRadius:mine?(sameSender?12:3):14,borderBottomLeftRadius:mine?14:(sameSender?12:3),borderTopRightRadius:mine?14:(sameSender?6:14),borderTopLeftRadius:mine?(sameSender?6:14):14,background:mine?sa.color+"25":C.s2,border:"1px solid "+(mine?sa.color+"30":C.bd)}}>
                          <p style={{fontSize:13.5,lineHeight:1.4,wordBreak:"break-word"}}>{m.content}</p>
                          {!sameSender&&<p style={{fontSize:8,color:C.t3,marginTop:2,textAlign:mine?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
              <div ref={endRef}/>
            </div>
          </div>
        )}

        {/* GROUP CHAT */}
        {view==="groupChat"&&activeGroup&&(
          <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{flex:1,overflow:"auto",padding:"10px 14px",display:"flex",flexDirection:"column",gap:2}}>
              {msgs.length===0&&<div style={{textAlign:"center",padding:32,color:C.t3}}><div style={{fontSize:28,marginBottom:6}}>{activeGroup.emoji}</div><p style={{fontSize:14,fontWeight:500}}>{activeGroup.name}</p></div>}
              {msgs.map(function(m,i){
                var mine=alters.some(function(a){return a.id===m.sender_alter_id;});
                var sa=allAlters[m.sender_alter_id]||{name:"?",color:"#888",avatar_emoji:"❓"};
                var prevMsg=msgs[i-1];
                var sameSender=prevMsg&&prevMsg.sender_alter_id===m.sender_alter_id;
                var prevDate=prevMsg?new Date(prevMsg.created_at).toDateString():"";
                var thisDate=new Date(m.created_at).toDateString();
                var showDay=prevDate!==thisDate;
                return (
                  <React.Fragment key={m.id}>
                    {showDay&&<div style={{textAlign:"center",padding:"8px 0",margin:"4px 0"}}><span style={{fontSize:10,color:C.t3,background:C.s2,padding:"3px 10px",borderRadius:10,fontWeight:600}}>{dayLabel(m.created_at)}</span></div>}
                    <div style={{display:"flex",justifyContent:mine?"flex-end":"flex-start",marginTop:sameSender?1:6}}>
                      <div style={{maxWidth:"82%",display:"flex",gap:4,flexDirection:mine?"row-reverse":"row",alignItems:"flex-end"}}>
                        {!sameSender?<Badge a={sa} sz={20}/>:<div style={{width:20,flexShrink:0}}/>}
                        <div style={{padding:"8px 12px",borderRadius:12,background:mine?sa.color+"25":C.s2,border:"1px solid "+(mine?sa.color+"30":C.bd)}}>
                          {!sameSender&&<p style={{fontSize:10,color:sa.color,fontWeight:600,marginBottom:2}}>{sa.name}</p>}
                          <p style={{fontSize:13.5,lineHeight:1.4,wordBreak:"break-word"}}>{m.content}</p>
                          {!sameSender&&<p style={{fontSize:8,color:C.t3,marginTop:2,textAlign:mine?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
              <div ref={endRef}/>
            </div>
          </div>
        )}
      </div>

      {/* MSG INPUT */}
      {inChat&&(
        <div style={{padding:"8px 12px",background:C.s1,borderTop:"1px solid "+C.bd,display:"flex",gap:6,flexShrink:0}}>
          <input value={msgIn} onChange={function(e){setMsgIn(e.target.value);}} placeholder={"Message as "+active.name+"..."}
            style={Object.assign({},IS,{flex:1,borderColor:active.color+"30",padding:"10px 14px",borderRadius:20,background:C.s2})}
            onFocus={function(e){e.target.style.borderColor=active.color;}} onBlur={function(e){e.target.style.borderColor=active.color+"30";}}
            onKeyDown={function(e){if(e.key==="Enter"){view==="chat"?sendDM():sendGM();}}}/>
          <button className="hov" onClick={view==="chat"?sendDM:sendGM} disabled={!msgIn.trim()||sending}
            style={Object.assign({},BT,{padding:"10px 14px",background:active.color,color:"#0a0b10",borderRadius:20,opacity:msgIn.trim()&&!sending?1:0.3})}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      )}

      {/* EDIT MODAL */}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={function(){setEditing(null);}}>
          <div className="pop" onClick={function(e){e.stopPropagation();}} style={{background:C.s1,borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:400,border:"1px solid "+C.bd,borderBottom:"none",maxHeight:"80vh",overflow:"auto"}}>
            <div style={{width:36,height:4,borderRadius:2,background:C.bd,margin:"0 auto 16px"}}/>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:14}}>Edit {editing.name}</h3>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input value={editing.name} onChange={function(e){setEditing(function(p){return Object.assign({},p,{name:e.target.value});});}} style={IS}/>
              <input value={editing.pronouns} onChange={function(e){setEditing(function(p){return Object.assign({},p,{pronouns:e.target.value});});}} placeholder="Pronouns" style={IS}/>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Color</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{COLS.map(function(c){return <div key={c} onClick={function(){setEditing(function(p){return Object.assign({},p,{color:c});});}} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:editing.color===c?"3px solid white":"3px solid transparent"}}/>;})}</div></div>
              <div><p style={{fontSize:11,color:C.t2,marginBottom:5}}>Emoji</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{EMO.map(function(em){return <div key={em} onClick={function(){setEditing(function(p){return Object.assign({},p,{avatar_emoji:em});});}} style={{width:30,height:30,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer",background:editing.avatar_emoji===em?C.s3:"transparent"}}>{em}</div>;})}</div></div>
              <div style={{display:"flex",gap:7,marginTop:8}}>
                <button className="hov" onClick={function(){setEditing(null);}} style={Object.assign({},BT,{flex:1,background:"transparent",color:C.t2,border:"1px solid "+C.bd})}>Cancel</button>
                <button className="hov" onClick={saveEdit} style={Object.assign({},BT,{flex:1,background:C.ac,color:"#0a0b10"})}>Save</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ROOT
function App(){
  var _s=useState(null),session=_s[0],setSession=_s[1];
  var _sys=useState(null),sys=_sys[0],setSys=_sys[1];
  var _alts=useState(null),alts=_alts[0],setAlts=_alts[1];
  var _ld=useState(true),loading=_ld[0],setLoading=_ld[1];
  useEffect(function(){var saved=LS.get("plural_session");if(saved){(async function(){try{var s=await db.get("systems","user_id=eq."+saved.user.id,saved.access_token);if(s.length>0){var a=await db.get("alters","system_id=eq."+s[0].id+"&order=created_at.asc",saved.access_token);setSession(saved);setSys(s[0]);setAlts(a);}else{setSession(saved);}}catch(e){LS.del("plural_session");}setLoading(false);})();}else{setLoading(false);}},[]);
  var handleAuth=useCallback(async function(d){setSession(d);LS.set("plural_session",d);try{var s=await db.get("systems","user_id=eq."+d.user.id,d.access_token);if(s.length>0){setSys(s[0]);var a=await db.get("alters","system_id=eq."+s[0].id+"&order=created_at.asc",d.access_token);setAlts(a);}}catch(e){}setLoading(false);},[]);
  var handleSetup=function(s,a){setSys(s);setAlts(a);};
  var handleLogout=function(){LS.del("plural_session");setSession(null);setSys(null);setAlts(null);};
  if(loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><Spin sz={28}/></div>;
  if(!session) return <Auth onAuth={handleAuth}/>;
  if(!sys||!alts||!alts.length) return <Setup token={session.access_token} userId={session.user.id} onDone={handleSetup}/>;
  return <Main session={session} system={sys} alters={alts} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
